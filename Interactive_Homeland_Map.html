<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red River Metis Homeland - Interactive Heritage Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
#map{height:100vh;width:100%}

/* Toggle buttons */
#menuBtn,#trailBtn{position:absolute;top:10px;z-index:1001;width:40px;height:40px;border-radius:8px;background:#fff;border:2px solid #e0e0e0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:.15s}
#menuBtn{left:330px}
#trailBtn{right:10px}

/* Sidebar */
.sidebar{position:absolute;top:10px;left:10px;z-index:1000;background:#fff;padding:15px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.18);width:300px;max-height:calc(100vh - 20px);overflow-y:auto;transition:transform .3s ease,opacity .3s ease}
.sidebar.collapsed{transform:translateX(-110%);opacity:0;pointer-events:none}
.sidebar h2{font-size:16px;margin-bottom:12px;color:#1a1a1a;border-bottom:2px solid #C0392B;padding-bottom:8px}
.sidebar input[type=text]{width:100%;padding:10px;margin-bottom:12px;border:2px solid #e0e0e0;border-radius:6px;font-size:14px;-webkit-appearance:none}
.sidebar input[type=text]:focus{outline:none;border-color:#C0392B}
.sidebar .stats{font-size:12px;color:#666;margin-bottom:12px;padding:8px;background:#f9f9f9;border-radius:4px;line-height:1.6}
.sidebar label{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:13px;cursor:pointer;padding:6px 8px;border-radius:4px;min-height:36px}
.sidebar label:hover{background:#f5f5f5}
.sidebar input[type=checkbox]{accent-color:#C0392B;width:18px;height:18px;flex-shrink:0;margin-top:1px}
.sidebar .section-title{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin:10px 0 4px;font-weight:600}

/* Collapsible layer groups */
.layer-group-header{font-size:13px;font-weight:700;color:#1a1a1a;padding:8px 6px;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid #eee;user-select:none}
.layer-group-header:hover{background:#f5f5f5}
.layer-group-header .group-icon{font-size:10px;color:#999;transition:transform .2s;display:inline-block;width:14px}
.layer-group-items{padding:2px 0 2px 8px}
.layer-group-items.collapsed{display:none}

/* Trails Panel */
.trails-panel{position:absolute;top:10px;right:60px;z-index:1000;background:#fff;padding:12px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.18);max-width:260px;max-height:70vh;overflow-y:auto;font-size:12px;transition:transform .3s ease,opacity .3s ease}
.trails-panel.collapsed{transform:translateX(110%);opacity:0;pointer-events:none}
.trails-panel h4{font-size:13px;margin:0 0 8px 0;color:#1a1a1a;border-bottom:2px solid #C0392B;padding-bottom:5px}
.trails-panel .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin:8px 0 3px;font-weight:600;background:#f4f4f4;padding:3px 6px;border-radius:3px}
.trails-panel label{display:flex;align-items:center;gap:6px;margin-bottom:4px;padding:3px 2px;min-height:32px;cursor:pointer}
.trails-panel input[type=checkbox]{accent-color:#27AE60;width:16px;height:16px;flex-shrink:0}
.btn-row{display:flex;gap:4px;margin:6px 0}
.btn-row button{flex:1;padding:5px 4px;font-size:10px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:#f9f9f9;min-height:30px}

/* Legend */
.legend{position:absolute;bottom:10px;right:10px;z-index:1000;background:#fff;padding:10px 12px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:11px;line-height:1.7;max-height:45vh;overflow-y:auto;max-width:200px}
.legend h4{margin:0 0 4px;font-size:12px;color:#333}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex-shrink:0}
.legend-line{width:20px;height:3px;border-radius:2px;flex-shrink:0}

/* Popups */
.popup-container{max-width:340px;font-size:13px;max-height:50vh;overflow-y:auto}
.popup-container h2{font-size:15px;margin:0 0 2px;color:#1a1a1a;line-height:1.3}
.popup-container .founded{font-size:11px;color:#888;margin-bottom:6px}
.popup-container .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;text-transform:uppercase;margin:2px 0;color:#fff}
.popup-container .section{margin:6px 0;padding:5px 0;border-top:1px solid #eee}
.popup-container .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:2px;font-weight:600}
.popup-container .section-text{font-size:12px;color:#555;line-height:1.5}
.popup-container .coords{font-size:10px;color:#aaa;font-family:monospace;margin:3px 0}
.priority{padding:1px 6px;border-radius:3px;font-size:10px;display:inline-block}
.priority-High{background:#E8F8F5;color:#1ABC9C}
.priority-Medium{background:#FEF9E7;color:#F39C12}

/* Slider */
.slider-container{margin-top:12px;background:#f4f4f4;padding:8px;border-radius:6px}
.slider-container>label{font-size:12px;font-weight:bold;color:#333;display:block;margin-bottom:4px}
.year-display{font-size:22px;font-weight:bold;color:#C0392B;text-align:center;margin-bottom:4px;font-family:monospace}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:40px;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:#ddd}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#C0392B;cursor:pointer;margin-top:-11px;box-shadow:0 2px 4px rgba(0,0,0,.3)}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#C0392B;cursor:pointer;border:none}

.overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:pointer}
.overlay.open{display:flex}
.overlay img{max-height:92vh;max-width:96vw;border-radius:4px}
.overlay .close{position:absolute;top:16px;right:20px;color:#fff;font-size:36px;cursor:pointer}

/* ===== MOBILE ===== */
@media(max-width:768px){
  /* Buttons: compact, left edge + right edge */
  #menuBtn{left:10px;top:10px;width:44px;height:44px;font-size:22px}
  #trailBtn{right:10px;top:10px;width:44px;height:44px;font-size:22px}
  
  /* Sidebar: slide-in overlay, max 85% width, max 80% height */
  .sidebar{
    left:0;top:0;width:85vw;max-width:340px;
    max-height:80vh;border-radius:0 12px 12px 0;
    transform:translateX(-110%);opacity:0;pointer-events:none;
    padding:14px;
    transition:transform .3s ease,opacity .3s ease;
  }
  .sidebar.open{transform:translateX(0);opacity:1;pointer-events:auto}
  .sidebar h2{font-size:15px;margin-bottom:8px;padding-bottom:6px}
  
  /* Search: prevent iOS zoom */
  .sidebar input[type=text]{font-size:16px;padding:8px;margin-bottom:8px}
  
  /* Layer groups: compact headers */
  .layer-group-header{font-size:12px;padding:6px 4px}
  .layer-group-items{padding:1px 0 1px 6px}
  
  /* Labels: larger touch targets */
  .sidebar label,.trails-panel label{padding:8px 10px;min-height:42px;font-size:13px}
  .sidebar input[type=checkbox],.trails-panel input[type=checkbox]{width:22px;height:22px}
  
  /* Trails panel: slide from right, narrower */
  .trails-panel{right:0;top:0;width:85vw;max-width:300px;max-height:80vh;border-radius:12px 0 0 12px}
  .trails-panel.collapsed{transform:translateX(110%)}
  
  /* Legend: hide on tablet+ to save map space */
  .legend{display:none}
  
  /* Popups */
  .popup-container{max-width:260px;font-size:12px;max-height:45vh}
  .popup-container h2{font-size:13px}
  .popup-container .section-text{font-size:11px}
  .popup-container .badge{font-size:8px;padding:2px 6px}
}

/* Small phones */
@media(max-width:480px){
  #menuBtn{width:40px;height:40px;font-size:18px;left:8px;top:8px}
  #trailBtn{width:40px;height:40px;font-size:18px;right:8px;top:8px}
  
  .sidebar{
    width:90vw;max-width:280px;max-height:75vh;
    padding:10px;border-radius:0 10px 10px 0;
  }
  .sidebar.open{transform:translateX(0);opacity:1;pointer-events:auto}
  .sidebar h2{font-size:14px;margin-bottom:6px;padding-bottom:5px}
  .sidebar input[type=text]{font-size:16px;padding:7px;margin-bottom:6px}
  .stats{font-size:11px;padding:6px;margin-bottom:8px}
  
  /* Collapsed layer groups by default */
  .layer-group-header{font-size:11px;padding:5px 3px}
  .layer-group-items{padding:0 0 0 5px}
  .layer-group-header .group-icon{font-size:9px;width:12px}
  
  /* Labels: slightly more compact */
  .sidebar label,.trails-panel label{padding:7px 8px;min-height:38px;font-size:12px}
  .sidebar input[type=checkbox],.trails-panel input[type=checkbox]{width:20px;height:20px}
  
  /* Trails panel */
  .trails-panel{
    width:90vw;max-width:260px;max-height:75vh;
    padding:10px;
    border-radius:10px 0 0 10px;
  }
  .trails-panel h4{font-size:12px;margin-bottom:6px;padding-bottom:4px}
  .trails-panel .section-label{font-size:9px;padding:2px 4px;margin:6px 0 2px}
  .trails-panel label{padding:5px 4px;min-height:34px;font-size:11px}
  .btn-row button{font-size:9px;padding:4px 3px;min-height:28px}
  
  /* Year slider */
  .slider-container{padding:6px;margin-top:8px}
  .year-display{font-size:18px;margin-bottom:3px}
  .slider-container>label{font-size:11px;margin-bottom:2px}
  
  /* Popups */
  .popup-container{max-width:240px;font-size:11px;max-height:40vh;padding:6px}
}

/* SOURCES */
.src-btn{display:inline-block;padding:3px 10px;border-radius:4px;background:#f9f9f9;border:1px solid #ddd;font-size:11px;cursor:pointer;color:#555;font-weight:600;text-decoration:none}
.src-btn:hover{background:#e8e8e8;border-color:#aaa}
.src-modal{display:none;position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.85);align-items:center;justify-content:center}
.src-modal.show{display:flex}
.src-modal-content{background:#fff;color:#1a1a1a;border-radius:12px;max-width:520px;width:92%;max-height:85vh;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.src-modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #e0e0e0}
.src-modal-header h3{font-size:15px;margin:0}
.src-modal-header button{background:none;border:none;font-size:22px;cursor:pointer;color:#999}
.src-modal-body{padding:14px 18px;overflow-y:auto;max-height:65vh}
.src-item{padding:12px 0;border-bottom:1px solid #eee}
.src-item:last-child{border-bottom:none}
.src-doc{font-size:12px;color:#888;margin-bottom:4px}
.src-detail{font-size:13px;color:#1a1a1a;margin-bottom:2px}
.src-match{margin-top:6px;font-size:11px}
.src-badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;color:#fff}
.src-badge.high{background:#27AE60}.src-badge.medium{background:#F39C12}.src-badge.low{background:#95A5A6}
</style>
</head>

// COLOR HELPER
function tColor(c){
    var t=(c||'').toLowerCase();
    if(t.indexOf('fort')>-1||t.indexOf('trading')>-1) return '#8E44AD';
    if(t.indexOf('parish')>-1||t.indexOf('mission')>-1) return '#1ABC9C';
    if(t.indexOf('battle')>-1||t.indexOf('fight')>-1) return '#27AE60';
    if(t.indexOf('road')>-1) return '#E67E22';
    return '#E74C3C';
}

// MARKERS

    m._layer = layer; m._name = l.n; m._index = i;

});

// POPUP BUILDER
function buildPopup(l){
    var h='<div class="popup-container"><h2>'+esc(l.n)+'</h2>';
    if(l.fo) h+='<div class="founded">Est. '+esc(l.fo)+'</div>';
    h+='<div class="coords">'+(l.la).toFixed(4)+'°, '+(l.lo).toFixed(4)+'°</div>';
    if(l.ct) h+='<span class="badge" style="background:'+tColor(l.ct)+'">'+esc(l.ct)+'</span>';
    if(l.pr) h+='<span class="priority priority-'+l.pr.replace(/\s/g,'')+'">'+esc(l.pr)+'</span>';
    
    if(l.ds) h+='<div class="section"><div class="section-label">Description</div><div class="section-text" style="font-weight:bold;color:#1a1a1a">'+esc(l.ds)+'</div></div>';
    if(l.st) h+='<div class="section"><div class="section-label">Heritage Story</div><div class="section-text">'+esc(l.st)+'</div></div>';
    if(l.ev) h+='<div class="section"><div class="section-label">Key Events</div><div class="section-text">'+esc(l.ev)+'</div></div>';
    if(l.fm) h+='<div class="section"><div class="section-label">Key Families</div><div class="section-text">'+esc(l.fm)+'</div></div>';
    if(l.rc) h+='<div class="section"><div class="section-label">Metis Rights</div><div class="section-text">'+esc(l.rc)+'</div></div>';
    if(l.ac) h+='<div class="section"><div class="section-label">Visitor Access</div><div class="section-text">'+esc(l.ac)+'</div></div>';
    h+='<div class="section"><a class="src-btn" href="javascript:void(0)" onclick="showSources(this)">Sources</a></div>';
    h+='</div>';
    return h;
}

// SIDEBAR
function buildSB(){
    var ld = document.getElementById('layer-toggles');
    
    // Stats
    var nSet = ML['Communities & Settlements'] ? ML['Communities & Settlements'].length : 0;
    var nForts = ML['Forts & Trading Posts'] ? ML['Forts & Trading Posts'].length : 0;
    document.getElementById('statbar').innerHTML = '<strong>'+nSet+' Settlements, '+nForts+' Forts</strong>';

    // Group layers by category for cleaner mobile UI
    var layerGroups = {
        'Communities': ['Communities & Settlements','Road Allowance Communities','Destroyed Communities'],
        'Trade & Worship': ['Forts & Trading Posts','Parishes & Missions','Resource & Harvesting Sites'],
        'History': ['Battles & Resistance','Governance & Rights','Transportation Routes','Wintering Grounds & Camps']
    };
    
    for(var group in layerGroups){
        // Collapsible group header
        var header = document.createElement('div');
        header.className = 'layer-group-header';
        header.innerHTML = '<span class="group-icon">&#9660;</span> '+group;
        header.onclick = function(){
            var items = this.nextElementSibling;
            var icon = this.querySelector('.group-icon');
            if(items.style.display === 'none'){
                items.style.display = 'block';
                icon.innerHTML = '&#9660;';
            } else {
                items.style.display = 'none';
                icon.innerHTML = '&#9654;';
            }
        };
        ld.appendChild(header);
        
        // Group items container
        var items = document.createElement('div');
        items.className = 'layer-group-items';
        
        layerGroups[group].forEach(function(layer){
            if(!ML[layer]) return;
            var label = document.createElement('label');
            var cb = document.createElement('input'); cb.type='checkbox'; cb.checked=true; cb.onchange=updateLayers;
            cb.id = 'lyr-'+layer.replace(/[^a-zA-Z0-9]/g,'');
            label.appendChild(cb);
            label.append(layer+' ('+ML[layer].length+')');
            items.appendChild(label);
        });
        ld.appendChild(items);
    }
}

// TIME MACHINE
document.getElementById('year-slider').addEventListener('input', function() {
    var val = parseInt(this.value);
    var display = document.getElementById('year-display');
    display.textContent = (val >= 2000) ? "All Years" : val;
    display.style.color = (val >= 2000) ? "#333" : "#C0392B";
    
    Object.values(ML).forEach(function(arr){
        arr.forEach(function(m){
            var data = locs[m._index];
            if(data.y <= val) map.addLayer(m);
            else map.removeLayer(m);
        });
    });
});

// SEARCH
function doSearch(){
    var q = document.getElementById('search').value.toLowerCase().trim();
    if(!q) { updateLayers(); return; }
    Object.values(ML).forEach(function(arr){
        arr.forEach(function(m){
            var n = (m._name||'').toLowerCase();
            var d = (locs[m._index].ds||'').toLowerCase();
            if(n.indexOf(q)>-1 || d.indexOf(q)>-1) map.addLayer(m);
            else map.removeLayer(m);
        });
    });
}

// LAYER UPDATE
function updateLayers(){
    // Markers
    Object.values(ML).forEach(function(arr){
        arr.forEach(function(m){
            var layer = m._layer;
            var cbId = 'lyr-'+layer.replace(/[^a-zA-Z0-9]/g,'');
            var cb = document.getElementById(cbId);
            // Only add if checkbox checked AND time slider allows
            var timeOk = locs[m._index].y <= parseInt(document.getElementById('year-slider').value);
            if(cb && cb.checked && timeOk) map.addLayer(m);
            else map.removeLayer(m);
        });
    });
}
