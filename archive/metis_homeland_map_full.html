<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#map{height:100vh;width:100%}
.sidebar{position:absolute;top:10px;left:10px;z-index:1000;background:#fff;padding:15px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:320px;max-height:calc(100vh - 40px);overflow-y:auto}
.sidebar h2{font-size:16px;margin-bottom:12px;color:#1a1a1a;border-bottom:2px solid #C0392B;padding-bottom:8px}
.sidebar input[type=text]{width:100%;padding:10px;margin-bottom:12px;border:2px solid #e0e0e0;border-radius:6px;font-size:14px}
.sidebar input[type=text]:focus{outline:none;border-color:#C0392B}
.sidebar .stats{font-size:12px;color:#666;margin-bottom:12px;padding:8px;background:#f9f9f9;border-radius:4px;line-height:1.6}
.sidebar label{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;cursor:pointer;padding:4px 8px;border-radius:4px}
.sidebar label:hover{background:#f5f5f5}
.sidebar input[type=checkbox]{accent-color:#C0392B}
.sidebar .section-title{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin:12px 0 6px;font-weight:600}
.legend{position:absolute;bottom:20px;right:20px;z-index:1000;background:#fff;padding:12px 15px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:12px;line-height:1.8}
.legend h4{margin:0 0 6px;font-size:13px;color:#333}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.2)}
.legend-line{width:24px;height:3px;border-radius:2px}
.popup-container{max-width:350px;font-size:13px}
.popup-container h2{font-size:16px;margin:0 0 4px;color:#1a1a1a}
.popup-container .founded{font-size:12px;color:#888;margin-bottom:8px}
.popup-container .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;margin:4px 0;color:#fff}
.popup-container .section{margin:8px 0;padding:6px 0}
.popup-container .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:2px}
.popup-container .section-text{font-size:12px;color:#333;line-height:1.5}
.popup-container .coords{font-size:10px;color:#aaa;font-family:monospace;margin:4px 0}
.priority-High{background:#E8F8F5;color:#1ABC9C}
.priority-Medium{background:#FEF9E7;color:#F39C12}
.priority-Low{background:#FDEDEC;color:#E74C3C}
.popup-img{width:100%;max-width:340px;border-radius:6px;margin:8px 0;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:pointer}
.overlay.open{display:flex}
.overlay img{max-height:92vh;max-width:92vw;border-radius:4px}
.overlay .close{position:absolute;top:20px;right:20px;color:#fff;font-size:40px;cursor:pointer}
.filter-count{font-size:11px;color:#666;margin-left:auto}
</style>

var locs=[{"n": "Ash House (Fort de la Frèniere)", "la": 49.4589, "lo": -100.4167, "d": "This North West Company \"canoe fort\" was established on the north shore of the Souris River, which was originally called Rivière St. Pierre by La Vérendrye. Located near present-day Hartney, the fort was strategically surrounded on three sides by the river for natural defense. It was built to challenge the growing competition of the Hudson’s Bay Company in the Assiniboine region. Astronomer David Thompson recorded its precise latitude, noting it was roughly 13.5 miles from where Plum Creek enter", "st": "The Silent Fort: A suspenseful narrative focused on the final year of operations, depicting the anxiety of traders during a lone winter at a fort \"too open to the incursions of the Sioux Indians\". The story ends with the hasty decision to desert the post just before David Thompson’s 1797 arrival found it empty.", "fo": "1795", "ct": "Fort / Trading Post", "gr": "Southern Red River Valley", "ml": "Forts & Trading Posts", "it": "fort", "ic": "#8E44AD", "th": "Community Life", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "St. Pierre", "kh": "1797 | Petition campaign", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Bacon Ridge", "la": 51.1542, "lo": -99.3039, "d": "Located south of Lake Ebb and Flow and its associated reserve, this settlement recorded a population of ninety Métis in 1959. It was categorized as a community where the Métis lived on the \"fringe\" of an Indian Reserve. The area is historically significant as a site for traditional maple sugaring.", "st": "The Fringe Dwellers: A social drama exploring the lives of a family at Bacon Ridge, navigating the cultural and legal gap between the neighboring reserve and the provincial government while harvesting maple syrup.", "fo": "1950s (Documented)", "ct": "Road Allowance Community", "gr": "Other / Dispersed Communities", "ml": "Road Allowance Communities", "it": "shack", "ic": "#E67E22", "th": "Traditional Resource Harvesting", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "1959", "pr": "High", "ac": "On First Nation land - visitors should contact community for access protocols"}, {"n": "Baie de Canard", "la": 52.1764, "lo": -100.1492, "d": "A centuries-old gathering place on Lake Winnipegosis known for salt springs and fisheries. Many members took scrip in 1885 but unsuccessfully petitioned to return to Treaty status in 1893.", "st": "The Scrip Petition: A historical legal drama about the 1893 petition of the Duck Bay Métis as they struggle to reclaim their rights after being misled into taking scrip.", "fo": "Oral tradition / approximate", "ct": "Settlement", "gr": "Winnipeg - St. Boniface Core", "ml": "Governance & Rights", "it": "gavel", "ic": "#D4AC0D", "th": "Land Dispossession | Traditional Resource Harvesting", "rc": "Scrip system impact: Metis were issued individual scrip instead of communal land grants, leading to dispossession", "kf": "", "kh": "1885 | 1893 | Treaty era | Petition campaign", "pr": "High", "ac": "Urban location - limited historic remains visible"}, {"n": "Baie St. Paul", "la": 49.9822, "lo": -97.9011, "d": "A French-Métis parish on the Assiniboine River between St. François Xavier and Poplar Point. Father Belcourt founded the mission to transition the Métis and Saulteaux to a sedentary lifestyle by providing plows and oxen to plant potatoes, corn, and oats. The settlement included a school led by the Nolin sisters, who were fluent in French, English, Ojibwa, and Cree.", "st": "Graves in the Current: A haunting historical piece set during the catastrophic 1882 flood. As the cemetery slides into the rising Assiniboine, families are forced to make a difficult trek to North Dakota with their parish priest, Cyrille Saint-Pierre, to seek a new beginning.", "fo": "Oral tradition / approximate", "ct": "Parish / Settlement", "gr": "Lake Winnipegosis - Duck Bay Region", "ml": "Parishes & Missions", "it": "church", "ic": "#1ABC9C", "th": "Faith & Community | Education & Assimilation", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "1882", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Baie St. Paul (Saulteaux Village)", "la": 49.9822, "lo": -97.9011, "d": "A French-Métis parish on the Assiniboine River between St. François Xavier and Poplar Point. Father Belcourt founded the mission to transition the Métis and Saulteaux to a sedentary lifestyle by providing plows and oxen to plant potatoes, corn, and oats. The settlement included a school led by the Nolin sisters, who were fluent in French, English, Ojibwa, and Cree.", "st": "Graves in the Current: A haunting historical piece set during the catastrophic 1882 flood. As the cemetery slides into the rising Assiniboine, families are forced to make a difficult trek to North Dakota with their parish priest, Cyrille Saint-Pierre, to seek a new beginning.", "fo": "1832", "ct": "Parish / Settlement", "gr": "Lake Winnipegosis - Duck Bay Region", "ml": "Parishes & Missions", "it": "church", "ic": "#1ABC9C", "th": "Faith & Community | Education & Assimilation", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "1882", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Balsam Bay", "la": 50.4189, "lo": -96.6514, "d": "A Métis community located south of Grand Beach with a recorded history dating to 1884. It was named by Matilda Aerson (née Thomas). The community was known for its local cemetery, which provided free burial grounds for several surrounding settlements including Beaconia, Stony Point, and Belair.", "st": "Guardians of the Bay: A narrative centered on the community’s efforts to maintain their unique identity and their sacred free burial grounds as the surrounding area begins to transform into a popular tourist destination for outsiders.", "fo": "1884", "ct": "Settlement", "gr": "Other / Dispersed Communities", "ml": "Communities & Settlements", "it": "village", "ic": "#3498DB", "th": "Community Life", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "1884", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Barrows (Baden, Powell, National Mills and Red Deer Lake)", "la": 52.8317, "lo": -101.4428, "d": "This area was settled by the Red River Métis in the late 1700s. Barrows is the largest of a cluster of five associated Métis communities situated on the northern edge of the Porcupine Forest. It served as a rapidly constructed lumber town for the Red Deer Lumber Company. By the mid-1920s, the mill operation ceased, leading to a decline in the town's prominence. The area is historically linked to the Fort Red Deer River (or Fort Rivière la Biche), a North West Company post founded by Hugh McGilli", "st": "The Last Sawmill: A historical drama set in 1926 following a Métis family in Barrows as the Red Deer Lumber Company mill whistles blow for the final time. The story explores their struggle to maintain their deep connection to the Porcupine Forest while the economic engine of their town is dismantled, forcing a choice between the land they have occupied since the 1700s and seeking labor in the cities to the south.", "fo": "Late 1700s", "ct": "Settlement (Lumber Towns)", "gr": "The Pas & Northern Manitoba", "ml": "Forts & Trading Posts", "it": "fort", "ic": "#8E44AD", "th": "Community Life", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "1794 | 1926 | 1959", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Bas de la Rivière (Fort Alexander)", "la": 50.6053, "lo": -96.2917, "d": "Originally established as a wintering post and depot for the North West Company in 1732, this location was vital because the soil was suitable for agriculture when other areas failed. In 1792, Simon Fraser and Lesieur Toussaint established a larger post here, also known as Sieurs Fort. It served as a strategic provisioning hub where bags of pemmican from the upper Assiniboine were stored for canoe brigades traveling to the far northwest. It was the unofficial capital of the NW Company's Lake Win", "st": "The Provisioning Brigade: A historical account set during a winter of starvation in the early Red River Settlement. The narrative follows the Métis staff at Bas de la Rivière as they manage a massive ranch for hogs and cattle and work through the night at their horse-powered flour mill to prepare life-saving seed grain and salted Traverse Bay whitefish for the desperate Selkirk Settlers.", "fo": "1732", "ct": "Fort / Trading Post", "gr": "Winnipeg - St. Boniface Core", "ml": "Forts & Trading Posts", "it": "fort", "ic": "#8E44AD", "th": "Seasonal Economy & Mobility | Traditional Resource Harvesting", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "1732 | 1792 | 1817 | Pemmican trade", "pr": "Medium", "ac": "Urban location - limited historic remains visible"}, {"n": "Bas de la Rivière (Pine Falls, Fort Alexander)", "la": 50.6053, "lo": -96.2917, "d": "This community spanned both shores of the Winnipeg River, from Pointe au Foutre (the portage at Pine Falls) down to Traverse Bay on Lake Winnipeg. It was ideally positioned for the October whitefish fishery, where fish spawn on the gravel bottoms of the bay. By the early 1800s, it featured extensive gardens that sold vegetables to incoming settlers. After the amalgamation of the fur companies in 1821, the site lost its status as a major transshipment hub but remained a thriving Métis agricultura", "st": "The Whitefish Run: A vibrant seasonal story centered on the annual October migration of whitefish. The plot follows families as they gather on the gravel shoals of Traverse Bay, utilizing traditional fishing techniques to stock their winter larders. The narrative contrasts the tranquility of the river life with the frantic labor of the \"Harvest Brigade\" that once defined the post's importance to the entire northwest.", "fo": "1732", "ct": "Fort / Settlement", "gr": "Winnipeg - St. Boniface Core", "ml": "Forts & Trading Posts", "it": "fort", "ic": "#8E44AD", "th": "Urban Displacement | Traditional Resource Harvesting", "rc": "No land title: Road allowance communities had no legal recognition and were subject to forced displacement", "kf": "", "kh": "1821 | 1958", "pr": "High", "ac": "Urban location - limited historic remains visible"}, {"n": "Batoche", "la": 52.7533, "lo": -106.1158, "d": "A destination for French-speaking Métis who moved permanently to their traditional wintering quarters after the 1869-70 Resistance. It is recognized as a significant community in the Métis Homeland.", "st": "Relocation West: A story follows a family from the Red River valley making the long journey west to their wintering grounds in Batoche to escape the social and political changes following 1870.", "fo": "Historic wintering site", "ct": "Settlement (Wintering site)", "gr": "Saskatchewan Homeland - Batoche Region", "ml": "Battles & Resistance", "it": "battlefield", "ic": "#C0392B", "th": "Resistance & Sovereignty | Seasonal Economy & Mobility", "rc": "Sovereignty action: Community actively defended Metis land rights against colonial encroachment", "kf": "", "kh": "1869 | 1870", "pr": "High", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Battle River Valley", "la": 52.8833, "lo": -108.2833, "d": "A vital wintering hunting grounds in the Saskatchewan River parkland where the north buffalo hunt brigades of the Metis wintered each season near the river valley. This area served as a crucial gathering point for Metis families in the 1850s-1880s, providing abundant buffalo, pemmican production, and fur trading. The community maintained strong kinship links to Batoche, St. Laurent, and St. Albert, serving as the northern anchor of the plains Metis homeland.", "st": "The Western Hunt: A narrative following a hunt brigade as they move through the Battle River Valley, documenting the seasonal lifestyle and kinship ties established in the western interior.", "fo": "Historic", "ct": "Settlement / Wintering site", "gr": "Saskatchewan Homeland - Batoche Region", "ml": "Battles & Resistance", "it": "battlefield", "ic": "#C0392B", "th": "Resistance & Sovereignty | Seasonal Economy & Mobility", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "Buffalo hunting", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Berens River", "la": 52.3578, "lo": -97.0253, "d": "Located on the east shore of Lake Winnipeg, this site was a stopping point for Métis boatmen since 1765. It was a thriving community until 1970, when a ban on fishing due to mercury contamination devastated the local economy. Most fishermen were forced to relocate, leaving the remainder dependent on government compensation.", "st": "The Poisoned Lake: A poignant story about a legendary fisherman from Berens River dealing with the sudden loss of his livelihood and his traditional connection to the water after the 1970 mercury crisis.", "fo": "1814 (First post)", "ct": "Settlement / Trading Post", "gr": "Winnipeg - St. Boniface Core", "ml": "Forts & Trading Posts", "it": "fort", "ic": "#8E44AD", "th": "Community Life", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "1765 | 1970", "pr": "Medium", "ac": "Urban location - limited historic remains visible"}, {"n": "Big Eddy (Settlement)", "la": 53.8419, "lo": -101.3144, "d": "A road allowance community located seven kilometers northwest of The Pas. When The Pas was incorporated in 1912, Big Eddy was intentionally excluded from the town boundaries. This exclusion allowed the municipality to deny Métis residents access to basic services like water and sewer.", "st": "Outside the Line: A political drama following a community leader in Big Eddy as he petitions the government to extend simple town services to his community, which is visible but legally excluded from the town's prosperity.", "fo": "1912 (Incorporation exclusion)", "ct": "Road Allowance Community", "gr": "Northern NWT Homeland", "ml": "Road Allowance Communities", "it": "shack", "ic": "#E67E22", "th": "Urban Displacement", "rc": "No land title: Road allowance communities had no legal recognition and were subject to forced displacement", "kf": "", "kh": "1912 | Petition campaign", "pr": "High", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Birds Hill", "la": 50.0069, "lo": -96.9203, "d": "Named after James Curtis Bird, an HBC Chief Factor who received a 3,000-acre land grant here in 1824. Known as \"the Pines,\" its high ground served as a vital sanctuary for Red River settlers and their livestock during the great floods of 1826 and 1852.", "st": "Refuge in the Pines: A survival story set during the 1852 flood, where diverse groups of Métis and settlers huddle together on the high ground while the valley below becomes an inland sea.", "fo": "1824 (Grant)", "ct": "Historic Sanctuary", "gr": "Winnipeg - St. Boniface Core", "ml": "Communities & Settlements", "it": "village", "ic": "#3498DB", "th": "Community Life", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "Bird; Grant", "kh": "1824 | 1826 | 1852", "pr": "High", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Birsay Village", "la": 51.0959, "lo": -106.9812, "d": "Built west of Fort Douglas by Orkney-Cree Michif freemen seeking a sedentary life. Named for the home parish of leader Magnus Spence. The village was hit by outbreaks of whooping cough and measles, followed by a plague of grasshoppers that destroyed their crops.", "st": "The Orkney Dream: A historical tragedy detailing the resilience and heartbreak of the Orkney freemen as they attempt to build a permanent home only to be defeated by disease and insects in 1819.", "fo": "Oral tradition / approximate", "ct": "Settlement", "gr": "Other / Dispersed Communities", "ml": "Forts & Trading Posts", "it": "fort", "ic": "#8E44AD", "th": "Community Destruction | Faith & Community", "rc": "PFRA displacement: Community destroyed under Prairie Farm Rehabilitation Act for community pasture creation", "kf": "Spence", "kh": "1819", "pr": "High", "ac": "Site destroyed or inaccessible"}, {"n": "Birsay Village or Orkney Town", "la": 51.0959, "lo": -106.9812, "d": "Built west of Fort Douglas by Orkney-Cree Michif freemen seeking a sedentary life. Named for the home parish of leader Magnus Spence. The village was hit by outbreaks of whooping cough and measles, followed by a plague of grasshoppers that destroyed their crops.", "st": "The Orkney Dream: A historical tragedy detailing the resilience and heartbreak of the Orkney freemen as they attempt to build a permanent home only to be defeated by disease and insects in 1819.", "fo": "1817", "ct": "Settlement", "gr": "Other / Dispersed Communities", "ml": "Forts & Trading Posts", "it": "fort", "ic": "#8E44AD", "th": "Community Destruction | Faith & Community", "rc": "PFRA displacement: Community destroyed under Prairie Farm Rehabilitation Act for community pasture creation", "kf": "Spence", "kh": "1819", "pr": "High", "ac": "Site destroyed or inaccessible"}, {"n": "Black Butte (Butte Noir)", "la": 48.9833, "lo": -102.6667, "d": "Known as 'Butte Noir' to the French-speaking Metis, this prominent landmark near the North Dakota-Manitoba border served as a critical navigation point for the great annual buffalo hunts between the Red River and the Missouri. Standing distinct against the horizon, it was used as a meeting place where hunting parties would confirm directions, scout for herds, and gather for council meetings. The site holds significance in oral histories as both a spiritual lookout and a practical waymark for the", "st": "The Lookout: A story follows a buffalo scout stationed at Black Butte, monitoring the herds and approaching brigades during the peak of the 19th-century hunts.", "fo": "Historic", "ct": "Settlement / Landmark", "gr": "Other / Dispersed Communities", "ml": "Communities & Settlements", "it": "village", "ic": "#3498DB", "th": "Community Life", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Blood River Post (Bloodvein River)", "la": 53.5833, "lo": -95.0667, "d": "An HBC post located at the mouth of the Bloodvein River on Lake Winnipeg. It was part of the extensive northern trade network utilized by Métis boatmen.", "st": "The Blood River Brigade: A story following a York boat brigade's stop at the post, highlighting the cultural interactions between traders and local bands along the eastern shore.", "fo": "1794", "ct": "Trading Post", "gr": "Winnipeg - St. Boniface Core", "ml": "Forts & Trading Posts", "it": "fort", "ic": "#8E44AD", "th": "Community Life", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "", "pr": "Medium", "ac": "Urban location - limited historic remains visible"}, {"n": "Blueberry Patch", "la": 49.8553, "lo": -97.2344, "d": "Traditional harvesting grounds within the Swan Pelican Provincial Forest used by the Métis and First Nations people of Pine Creek, Camperville, and Duck Bay. Located on unoccupied Crown lands, these grounds were essential for food and medicinal gathering.", "st": "The Blue Harvest: A seasonal narrative focusing on the annual gathering of families at the patch, where traditional harvesting is blended with the sharing of oral histories and medicinal knowledge.", "fo": "Ancient / Traditional", "ct": "Traditional Harvesting Site", "gr": "Lake Winnipegosis - Duck Bay Region", "ml": "Wintering Grounds & Camps", "it": "tipi", "ic": "#27AE60", "th": "Traditional Resource Harvesting", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "", "pr": "Medium", "ac": "On First Nation land - visitors should contact community for access protocols"}, {"n": "Boggy Creek and San Clara", "la": 51.5714, "lo": -101.3931, "d": "Settled by fur trade families in the 1880s, these hubs near Roblin were thriving communities for trapping and trade. In the late 1930s, many founding families (Jeromes, Langans) were forcibly displaced under the Prairie Farm Rehabilitation Act to create community pastures.", "st": "The Pasture War: A narrative focusing on the 1930s displacement, following a family as they watch their homestead being transformed into a government-run pasture while their homes are burned.", "fo": "Early 1880s", "ct": "Settlement", "gr": "Swan River - Dauphin Region", "ml": "Communities & Settlements", "it": "village", "ic": "#3498DB", "th": "Land Dispossession | Community Destruction", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Brandon House and Fort Assiniboine", "la": 49.6978, "lo": -99.6386, "d": "Brandon House was founded by the HBC on the northeast bank of the Assiniboine River. It was a central trade hub but underwent several moves due to competition. In 1816, it was famously captured and plundered by Cuthbert Grant and a party of Métis as a prelude to the Battle of Seven Oaks.", "st": "The Capture of Brandon House: A tense historical drama set on June 1, 1816, following the strategic decisions of Cuthbert Grant's party as they seize the fort's pemmican stores to bypass the Red River colony.", "fo": "Oct 16, 1793", "ct": "Forts / Trading Posts", "gr": "Winnipeg - St. Boniface Core", "ml": "Battles & Resistance", "it": "battlefield", "ic": "#C0392B", "th": "Resistance & Sovereignty | Seasonal Economy & Mobility", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "Grant", "kh": "1816 | June 19 1816 | Petition campaign | Pemmican trade", "pr": "High", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Buffalo Lake", "la": 52.5438, "lo": -105.4536, "d": "A historic wintering site for Metis hivernants (winterers) in central Saskatchewan, situated in the Aspen Parkland region. This lake was part of the broader network of communities centered around the North Saskatchewan River system. The settlement was known for its deep involvement in the buffalo hunt and served as a strategic gathering point where families pooled resources during the harsh winter months, maintaining their Michif culture and independence.", "st": "Winter at Buffalo Lake: A narrative detailing the social life and survival strategies of a Métis wintering brigade (hivernants) at Buffalo Lake during the mid-19th century.", "fo": "Historic", "ct": "Settlement (Wintering site)", "gr": "Saskatchewan Homeland - Batoche Region", "ml": "Battles & Resistance", "it": "battlefield", "ic": "#C0392B", "th": "Resistance & Sovereignty | Seasonal Economy & Mobility", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "kf": "", "kh": "", "pr": "Medium", "ac": "Generally accessible - verify with local community before visiting"}, {"n": "Butte St. Paul (\"Ot Accowabiw var trails=[{"name": "Carlton Trail", "type": "cart", "year": "1840s-1880s", "desc": "Main overland freight route from Red River Settlement to Fort Edmonton. Vital artery of the fur trade and Metis buffalo hunting economy. Red River carts hauled tons of pemmican, furs, and supplies across the prairies.", "wp": [[49.888, -97.142], [49.913, -97.542], [49.973, -98.29], [50.071, -96.983], [51.316, -101.288], [52.755, -106.116], [53.683, -113.214]]}, {"name": "Red River Cart Trail to Pembina", "type": "cart", "year": "1820s-1870s", "desc": "Southern cross-border route to Pembina for buffalo hunts and trade. The Metis hunted south into Dakota Territory, crossing freely before the border was enforced.", "wp": [[49.888, -97.142], [49.819, -97.136], [49.766, -97.147], [48.967, -97.248]]}, {"name": "Cypress Hills Winter Hunting Trail", "type": "cart", "year": "1840s-1873", "desc": "Route from Wood Mountain to Cypress Hills for winter buffalo hunting. Site of the 1873 Cypress Hills Massacre where Assiniboine people were killed, leading to the creation of the North-West Mounted Police.", "wp": [[49.371, -106.384], [49.549, -109.868]]}, {"name": "Touchwood Hills Trail", "type": "cart", "year": "1850s-1880s", "desc": "Route from Qu'Appelle through Touchwood Hills for winter hunting. Used by Metis families to access buffalo herds during harsh winters.", "wp": [[50.541, -103.878], [50.952, -103.89], [50.397, -105.536]]}, {"name": "York Factory Express", "type": "boat", "year": "1821-1850s", "desc": "Hudson's Bay Company's primary route from Red River to York Factory on Hudson Bay. Crews of Metis voyageurs navigated Lake Winnipeg and rivers in York boats to deliver furs and supplies.", "wp": [[49.888, -97.142], [51.651, -98.497], [53.967, -97.833], [57.003, -92.305]]}, {"name": "Nelson River Route", "type": "boat", "year": "1700s-1800s", "desc": "Ancient water route from Norway House along Nelson River to Hudson Bay. Indigenous traders used this route for centuries before the HBC established posts.", "wp": [[53.967, -97.833], [55.476, -107.918], [57.003, -92.305]]}, {"name": "Saskatchewan River Route", "type": "boat", "year": "1700s-1885", "desc": "Water route up the Saskatchewan River connecting Red River to Batoche and fur trade posts. Gabriel Dumont and Metis families traveled this route.", "wp": [[49.888, -97.142], [52.755, -106.116], [53.203, -105.753]]}];
var ML={},TL={};

function tColor(c){
 var t=((c||'').toLowerCase());
 if(t.indexOf('fort')>-1||t.indexOf('trading')>-1)return'#8E44AD';
 if(t.indexOf('parish')>-1||t.indexOf('mission')>-1)return'#1ABC9C';
 if(t.indexOf('battle')>-1||t.indexOf('fight')>-1)return'#27AE60';
 if(t.indexOf('road')>-1||t.indexOf('allowance')>-1)return'#E67E22';
 return'#E74C3C';
}

// MARKERS
locs.forEach(function(l){
 if(!l.la||!l.lo)return;
 var col=l.ic&&l.ic!=='#3B82F6'?l.ic:tColor(l.ct);
 var layer=l.ml||l.it||'Other';
 if(!ML[layer])ML[layer]=[];
 
 var h='<div class="popup-container"><h2>'+esc(l.n)+'</h2>';
 if(l.fo)h+='<div class="founded">Est. '+esc(l.fo)+'</div>';
 h+='<div class="coords">'+l.la.toFixed(4)+'°, '+( -l.lo).toFixed(4)+'°</div>';
 if(l.ct)h+='<span class="badge" style="background:'+col+'">'+esc(l.ct)+'</span>';
 if(l.d)h+='<div class="section"><div class="section-label">History</div><div class="section-text">'+esc(l.d)+'</div></div>';
 if(l.st)h+='<div class="section"><div class="section-label">Heritage Story</div><div class="section-text">'+esc(l.st)+'</div></div>';
 if(l.rc)h+='<div class="section"><div class="section-label">Metis Rights Context</div><div class="section-text">'+esc(l.rc)+'</div></div>';
 if(l.kh)h+='<div class="section"><div class="section-label">Key Events</div><div class="section-text">'+esc(l.kh)+'</div></div>';
 if(l.kf)h+='<div class="section"><div class="section-label">Key Families</div><div class="section-text">'+esc(l.kf)+'</div></div>';
 if(l.ac)h+='<div class="section"><div class="section-label">Visitor Access</div><div class="section-text">'+esc(l.ac)+'</div></div>';
 if(l.pr){var pc='priority-'+l.pr.replace(/\s/g,'');h+='<span class="priority '+pc+'">Priority: '+esc(l.pr)+'</span>';}
 h+='</div>';
 
 var m=L.circleMarker([l.la,l.lo],{radius:7,fillColor:col,color:'#fff',weight:2,fillOpacity:.85}).bindPopup(h);
 m._layer=layer;m._name=l.n;
 ML[layer].push(m);
});

// TRAILS
trails.forEach(function(t){
 if(!t.wp||!t.wp.length)return;
 var c=t.type==='cart'?'#E67E22':'#2980B9';
 var w=t.type==='cart'?3:4;
 var d=t.type==='cart'?'10, 5':'15, 5, 5, 5';
 var ln=t.type==='cart'?'Cart Trails':'Boat Routes';
 if(!TL[ln])TL[ln]=[];
 var p=L.polyline(t.wp,{color:c,weight:w,opacity:.85,dashArray:d}).bindPopup('<b>'+esc(t.name)+'</b><br><span style="color:#888;font-size:12px">'+esc(t.year)+'</span><br><br>'+esc(t.desc));
 p._layer=ln;p._name=t.name;
 TL[ln].push(p);
});

// SIDEBAR
function buildSB(){
 var ld=document.getElementById('layer-toggles');
 var td=document.getElementById('trail-toggles');
 Object.keys(ML).sort().forEach(function(layer){
  var label=document.createElement('label');
  var cb=document.createElement('input');
  cb.type='checkbox';cb.checked=true;cb.id='lyr-'+layer.replace(/[^a-zA-Z0-9]/g,'');
  cb.onchange=updateLayers;
  label.appendChild(cb);
  label.appendChild(document.createTextNode(layer+' ('+ML[layer].length+')'));
  ld.appendChild(label);
 });
 Object.keys(TL).sort().forEach(function(layer){
  var label=document.createElement('label');
  var cb=document.createElement('input');
  cb.type='checkbox';cb.checked=true;cb.id='trl-'+layer.replace(/[^a-zA-Z0-9]/g,'');
  cb.onchange=updateLayers;
  label.appendChild(cb);
  label.appendChild(document.createTextNode(layer+' ('+TL[layer].length+')'));
  td.appendChild(label);
 });
}

function updateLayers(){
 Object.values(ML).forEach(function(a){a.forEach(function(m){map.removeLayer(m)})});
 Object.values(TL).forEach(function(a){a.forEach(function(t){map.removeLayer(t)})});
 Object.keys(ML).forEach(function(layer){
  var cb=document.getElementById('lyr-'+layer.replace(/[^a-zA-Z0-9]/g,''));
  if(cb&&cb.checked)ML[layer].forEach(function(m){map.addLayer(m)});
 });
 Object.keys(TL).forEach(function(layer){
  var cb=document.getElementById('trl-'+layer.replace(/[^a-zA-Z0-9]/g,''));
  if(cb&&cb.checked)TL[layer].forEach(function(t){map.addLayer(t)});
 });
}

function doSearch(){
 var q=document.getElementById('search').value.toLowerCase().trim();
 if(!q){updateLayers();return}
 Object.values(ML).forEach(function(a){a.forEach(function(m){
  var n=(m._name||'').toLowerCase();
  if(n.indexOf(q)>-1)map.addLayer(m);else map.removeLayer(m);
 })});
 if(q.length>=3){
  Object.values(ML).forEach(function(a){a.forEach(function(m){
   if(!map.hasLayer(m)){
    var p=m.getPopup();
    if(p&&p.getContent().toLowerCase().indexOf(q)>-1)map.addLayer(m);
   }
  })});
 }
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

buildSB();
updateLayers();
Object.values(ML).forEach(function(a){a.forEach(function(m){map.addLayer(m)})});
Object.values(TL).forEach(function(a){a.forEach(function(t){map.addLayer(t)})});
</script>
