<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#1a1714;color:#f0e6d8}
:root{

  --xs:4px;--sm:8px;--md:16px;--lg:24px;
}
#map{width:100%;height:100vh}

/* Header */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bgov);backdrop-filter:blur(12px);padding:var(--sm) var(--lg);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);height:56px}
.h-brand{display:flex;flex-direction:column;gap:1px}
.h-title{font-size:1rem;font-weight:600;color:var(--t1);letter-spacing:.01em}
.h-sub{font-size:.72rem;color:var(--t3)}
.h-actions{display:flex;align-items:center;gap:var(--sm)}
.h-search{padding:var(--xs) var(--sm);border:1px solid var(--brd2);border-radius:var(--r2);background:var(--bg3);color:var(--t1);font-size:.8rem;width:200px;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.h-search::placeholder{color:var(--t3)}
.h-search:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.h-stat{display:flex;align-items:center;gap:var(--xs);padding:var(--xs) var(--sm);background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r2);font-size:.72rem;color:var(--t2)}
.h-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:68px;left:var(--md);z-index:1000;width:260px;max-height:calc(100vh - 84px);background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r3);box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column}
.sb-head{padding:var(--md);background:var(--bg3);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);border-bottom:1px solid var(--brd)}
.sb-body{overflow-y:auto;padding:var(--xs) 0}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:var(--r1)}

/* Layer buttons */
.lbtn{display:flex;align-items:center;gap:var(--sm);padding:var(--sm) var(--md);cursor:pointer;font-size:.8rem;color:var(--t1);transition:background .15s;user-select:none;border-bottom:1px solid var(--brd)}
.lbtn:last-child{border-bottom:none}
.lbtn:hover{background:var(--glow)}
.lbtn.on{background:var(--glow)}
.ldot{width:10px;height:10px;border-radius:50%;border:2px solid var(--brd2);flex-shrink:0}
.ldot.on{border-color:transparent}
.lcnt{margin-left:auto;background:var(--bg3);padding:1px 8px;border-radius:10px;font-size:.68rem;color:var(--t3);font-variant-numeric:tabular-nums}
.ldiv{height:2px;background:var(--brd2);margin:var(--xs) var(--md)}

/* Legend */
.legend{position:fixed;bottom:var(--lg);right:var(--lg);z-index:1000;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);padding:var(--md);box-shadow:0 4px 16px rgba(0,0,0,.4);font-size:.75rem}
.leg-title{font-weight:600;color:var(--t1);margin-bottom:var(--sm);font-size:.78rem}
.leg-row{display:flex;align-items:center;gap:var(--sm);margin-bottom:var(--xs);color:var(--t2)}
.leg-line{width:28px;height:4px;border-radius:2px}

/* Leaflet overrides */
.leaflet-control-zoom{border:1px solid var(--brd2)!important;border-radius:var(--r2)!important;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.4)}

.leaflet-control-zoom a:hover{background:var(--accent3)!important;color:var(--t1)!important}
.leaflet-control-attribution{background:var(--bgov)!important;color:var(--t3)!important;font-size:.65rem!important}
.leaflet-control-attribution a{color:var(--accent)!important}
</style>

// Layer definitions
const LC = {
    'Forts & Trading Posts': '#FF9800',
    'Communities & Settlements': '#4CAF50',
    'Parishes & Missions': '#9C27B0',
    'Road Allowance Communities': '#FF5722',
    'Wintering Grounds & Camps': '#2196F3',
    'Battles & Resistance': '#F44336',
    'Destroyed Communities': '#9E9E9E',
    'Resource & Harvesting Sites': '#8BC34A',
    'Governance & Rights': '#FFC107',
    'Transportation Routes': '#00BCD4',
};



// ===== Map init =====
const map = L.map('map', {center:[52.0, -99.0], zoom:5, minZoom:4, maxZoom:13, zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom:19, subdomains:'abcd'
}).addTo(map);

// ===== Layer groups =====
const LG = {};
Object.keys(LC).forEach(function(l) {
    LG[l] = L.layerGroup();
});

// ===== Location markers =====
locations.forEach(function(loc) {
    var color = LC[loc.layer] || '#4CAF50';
    var r = loc.priority === 'High' ? 8 : 5.5;
    var m = L.circleMarker([loc.lat, loc.lng], {
        radius: r, fillColor: color, color: '#fff', weight: 1,
        opacity: 0.85, fillOpacity: 0.75
    });
    m.bindPopup(
        '<div style="color:#1a1714">' +
        '<b>' + loc.name + '</b><br>' +
        '<small>' + loc.type + '</small> | <small>' + loc.founded + '</small><br>' +
        '<small>' + loc.lat.toFixed(4) + ', ' + loc.lng.toFixed(4) + '</small>' +
        '<hr style="margin:6px 0;border:none;border-top:1px solid #ddd">' +
        '<p style="font-size:0.85em;line-height:1.4">' + loc.desc + '</p>' +
        '</div>'
    );
    LG[loc.layer].addLayer(m);
    LG[loc.layer].addTo(map);
});

// ===== Trail lines =====
const TG = L.layerGroup().addTo(map);
trails.forEach(function(t) {
    var line = L.polyline(t.coords, {
        color: t.color, weight: t.weight,
        dashArray: t.dash, opacity: 0.8
    });
    line.bindPopup(
        '<div style="color:#1a1714">' +
        '<b>' + t.name + '</b><br>' +
        '<span style="background:#eee;padding:2px 6px;border-radius:3px;font-size:0.75em">' + t.category + '</span> ' +
        '<span style="background:#eee;padding:2px 6px;border-radius:3px;font-size:0.75em">' + t.year + '</span><br><br>' +
        t.desc +
        '</div>'
    );
    TG.addLayer(line);
});

// ===== Build sidebar =====
var ld = document.getElementById('layers');
Object.keys(LC).forEach(function(name) {
    if (!LG[name]) return;
    var cnt = LG[name].getLayers().length;
    if (cnt === 0) return;
    var color = LC[name];
    var d = document.createElement('div');
    d.className = 'lbtn on';
    d.innerHTML = '<span class="ldot on" style="background:' + color + '"></span>' + name + '<span class="lcnt">' + cnt + '</span>';
    (function(btn, grp) {
        d.addEventListener('click', function() {
            if (map.hasLayer(grp)) {
                map.removeLayer(grp);
                btn.classList.remove('on');
            } else {
                map.addLayer(grp);
                btn.classList.add('on');
            }
            updCount();
        });
    })(d, LG[name]);
    ld.appendChild(d);
});

// Transport toggle
var tdb = document.createElement('div');
tdb.className = 'lbtn on';
tdb.innerHTML = '<span class="ldot on" style="background:var(--accent)"></span><span class="ldot on" style="background:#4da8da;margin-left:-4px"></span>Cart Trails &amp; Boat Routes<span class="lcnt">' + trails.length + '</span>';
tdb.addEventListener('click', function() {
    if (map.hasLayer(TG)) {
        map.removeLayer(TG);
        tdb.classList.remove('on');
    } else {
        map.addLayer(TG);
        tdb.classList.add('on');
    }
    updCount();
});
ld.appendChild(tdb);

// ===== Stats =====
function updCount() {
    var c = 0;
    locations.forEach(function(loc) {
        if (map.hasLayer(LG[loc.layer])) c++;
    });
    document.getElementById('vc').textContent = c;
}
updCount();
document.getElementById('sub').textContent = locations.length + ' locations &amp; ' + trails.length + ' historic routes';

// ===== Search =====
document.getElementById('search').addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    if (!q) return;
    var match = locations.find(function(loc) { return loc.name.toLowerCase().includes(q); });
    if (match) {
        map.setView([match.lat, match.lng], Math.max(map.getZoom(), 10));
        LG[match.layer].eachLayer(function(m) {
            if (m.getLatLng && Math.abs(m.getLatLng().lat - match.lat) < 0.0001) m.openPopup();
        });
    }
});
