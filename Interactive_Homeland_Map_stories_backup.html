<!DOCTYPE html>
<html lang="en">
<head>

<title>Red River Metis Homeland - Interactive Heritage Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#map{height:100vh;width:100%}
.sidebar{position:absolute;top:10px;left:10px;z-index:1000;background:#fff;padding:15px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:320px;max-height:calc(100vh - 40px);overflow-y:auto}
.sidebar h2{font-size:16px;margin-bottom:12px;color:#1a1a1a;border-bottom:2px solid #C0392B;padding-bottom:8px}
.sidebar input[type=text]{width:100%;padding:10px;margin-bottom:12px;border:2px solid #e0e0e0;border-radius:6px;font-size:14px}
.sidebar input[type=text]:focus{outline:none;border-color:#C0392B}
.sidebar .stats{font-size:12px;color:#666;margin-bottom:12px;padding:8px;background:#f9f9f9;border-radius:4px;line-height:1.6}
.sidebar label{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;cursor:pointer;padding:4px 8px;border-radius:4px}
.sidebar label:hover{background:#f5f5f5}
.sidebar input[type=checkbox]{accent-color:#C0392B}
.sidebar .section-title{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin:12px 0 6px;font-weight:600}
.legend{position:absolute;bottom:20px;right:20px;z-index:1000;background:#fff;padding:12px 15px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:12px;line-height:1.8;max-height:50vh;overflow-y:auto}
.legend h4{margin:0 0 6px;font-size:13px;color:#333}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.2)}
.legend-line{width:24px;height:3px;border-radius:2px}
/* Popups */
.popup-container{max-width:380px;font-size:13px;max-height:400px;overflow-y:auto}
.popup-container h2{font-size:15px;margin:0 0 2px;color:#1a1a1a;line-height:1.3}
.popup-container .founded{font-size:11px;color:#888;margin-bottom:6px}
.popup-container .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;text-transform:uppercase;margin:2px 0;color:#fff}
.popup-container .section{margin:6px 0;padding:5px 0;border-top:1px solid #eee}
.popup-container .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:2px;font-weight:600}
.popup-container .section-text{font-size:12px;color:#333;line-height:1.5}
.popup-container .coords{font-size:10px;color:#aaa;font-family:monospace;margin:3px 0}
.priority{padding:1px 6px;border-radius:3px;font-size:10px;display:inline-block}
.priority-High{background:#E8F8F5;color:#1ABC9C}
.priority-Medium{background:#FEF9E7;color:#F39C12}
/* Slider */
.slider-container{margin-top:15px;background:#f4f4f4;padding:10px;border-radius:6px}
.slider-container label{font-size:12px;font-weight:bold;color:#333;display:block;margin-bottom:5px}
.year-display{font-size:24px;font-weight:bold;color:#C0392B;text-align:center;margin-bottom:5px;font-family:monospace}
.overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:pointer}
.overlay.open{display:flex}
.overlay img{max-height:92vh;max-width:92vw;border-radius:4px}
.overlay .close{position:absolute;top:20px;right:20px;color:#fff;font-size:40px;cursor:pointer}
</style>
</head>

</div>

ores their struggle to maintain their deep connection to the Porcupine Forest while the economic engine of their town is dismantled, forcing a choice between the land they have occupied since the 1700s and seeking labor in the cities to the south. When industrialization came to Barrows (Baden, Powell, National Mills and Red Deer Lake) around Late ", "fo": "Late 1700s", "ct": "Settlement (Lumber Towns)", "ev": "1794 | 1926 | 1959", "fm": "", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "ac": "Generally accessible - verify with local community before visiting", "pr": "Medium", "ml": "Forts & Trading Posts", "ic": "#8E44AD", "y": 1700}, {"n": "Bas de la Rivière (Fort Alexander)", "la": 50.6053, "lo": -96.2917, "ds": "Originally established as a wintering post and depot for the North West Company in 1732, this location was vital because the soil was suitable for agriculture when other areas failed. In 1792, Simon Fraser and Lesieur Toussaint established a larger post here, also known as Sieurs Fort. It served as a strategic provisioning hub where bags of pemmica", "st": "A historical account set during a winter of starvation in the early Red River Settlement. The narrative follows the Métis staff at Bas de la Rivière as they manage a massive ranch for hogs and cattle and work through the night at their horse-powered flour mill to prepare life-saving seed grain and salted Traverse Bay whitefish for the desperate Selkirk Settlers. The trading post at Bas de la Rivière (Fort Alexander), established around 1732, was a vital center of the fur trade economy in the Win", "fo": "1732", "ct": "Fort / Trading Post", "ev": "1732 | 1792 | 1817 | Pemmican trade", "fm": "", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "ac": "Urban location - limited historic remains visible", "pr": "Medium", "ml": "Forts & Trading Posts", "ic": "#8E44AD", "y": 1732}, {"n": "Bas de la Rivière (Pine Falls, Fort Alexander)", "la": 50.6053, "lo": -96.2917, "ds": "This community spanned both shores of the Winnipeg River, from Pointe au Foutre (the portage at Pine Falls) down to Traverse Bay on Lake Winnipeg. It was ideally positioned for the October whitefish fishery, where fish spawn on the gravel bottoms of the bay. By the early 1800s, it featured extensive gardens that sold vegetables to incoming settlers", "st": "A vibrant seasonal story centered on the annual October migration of whitefish. The plot follows families as they gather on the gravel shoals of Traverse Bay, utilizing traditional fishing techniques to stock their winter larders. The narrative contrasts the tranquility of the river life with the frantic labor of the \"Harvest Brigade\" that once defined the post's importance to the entire northwest. The trading post at Bas de la Rivière (Pine Falls, Fort Alexander), established around 1732, was a", "fo": "1732", "ct": "Fort / Settlement", "ev": "1821 | 1958", "fm": "", "rc": "No land title: Road allowance communities had no legal recognition and were subject to forced displacement", "ac": "Urban location - limited historic remains visible", "pr": "High", "ml": "Forts & Trading Posts", "ic": "#8E44AD", "y": 1732}, {"n": "Batoche", "la": 52.7533, "lo": -106.1158, "ds": "A destination for French-speaking Métis who moved permanently to their traditional wintering quarters after the 1869-70 Resistance. It is recognized as a significant community in the Métis Homeland.", "st": "A story follows a family from the Red River valley making the long journey west to their wintering grounds in Batoche to escape the social and political changes following 1870. Each autumn from around Historic wintering site, Metis families journeyed to Batoche, carefully chosen for its shelter from prairie winds, access to firewood and water, and proximity to winter hunting grounds. Carts creaking and families traveling together, this annual migration connected the community to the seasonal rhy", "fo": "Historic wintering site", "ct": "Settlement (Wintering site)", "ev": "1869 | 1870", "fm": "", "rc": "Sovereignty action: Community actively defended Metis land rights against colonial encroachment", "ac": "Generally accessible - verify with local community before visiting", "pr": "High", "ml": "Battles & Resistance", "ic": "#C0392B", "y": 2000}, {"n": "Battle River Valley", "la": 52.8833, "lo": -108.2833, "ds": "A vital wintering hunting grounds in the Saskatchewan River parkland where the north buffalo hunt brigades of the Metis wintered each season near the river valley. This area served as a crucial gathering point for Metis families in the 1850s-1880s, providing abundant buffalo, pemmican production, and fur trading. The community maintained strong kin", "st": "A narrative following a hunt brigade as they move through the Battle River Valley, documenting the seasonal lifestyle and kinship ties established in the western interior. Each autumn from around Historic, Metis families journeyed to Battle River Valley, carefully chosen for its shelter from prairie winds, access to firewood and water, and proximity to winter hunting grounds. Carts creaking and families traveling together, this annual migration connected the community to the seasonal rhythm of t", "fo": "Historic", "ct": "Settlement / Wintering site", "ev": "Buffalo hunting", "fm": "", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "ac": "Generally accessible - verify with local community before visiting", "pr": "Medium", "ml": "Battles & Resistance", "ic": "#C0392B", "y": 2000}, {"n": "Berens River", "la": 52.3578, "lo": -97.0253, "ds": "Located on the east shore of Lake Winnipeg, this site was a stopping point for Métis boatmen since 1765. It was a thriving community until 1970, when a ban on fishing due to mercury contamination devastated the local economy. Most fishermen were forced to relocate, leaving the remainder dependent on government compensation.", "st": "A poignant story about a legendary fisherman from Berens River dealing with the sudden loss of his livelihood and his traditional connection to the water after the 1970 mercury crisis. The trading post at Berens River, established around 1814 (First post), was a vital center of the fur trade economy in the Winnipeg - St. Boniface Core. Metis families were drawn to the post as hunters, interpreters, boatmen, and provisioners -- their expertise making the entire enterprise possible. The community ", "fo": "1814 (First post)", "ct": "Settlement / Trading Post", "ev": "1765 | 1970", "fm": "", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "ac": "Urban location - limited historic remains visible", "pr": "Medium", "ml": "Forts & Trading Posts", "ic": "#8E44AD", "y": 1814}, {"n": "Big Eddy (Settlement)", "la": 53.8419, "lo": -101.3144, "ds": "A road allowance community located seven kilometers northwest of The Pas. When The Pas was incorporated in 1912, Big Eddy was intentionally excluded from the town boundaries. This exclusion allowed the municipality to deny Métis residents access to basic services like water and sewer.", "st": "A political drama following a community leader in Big Eddy as he petitions the government to extend simple town services to his community, which is visible but legally excluded from the town's prosperity. The road allowance community at Big Eddy (Settlement) emerged after 1885, when Metis families dispossessed by the scrip system and settler encroachment were forced onto the margins of surveyed land -- the Crown land strips set aside for future roads and railways. These communities were born of ", "fo": "1912 (Incorporation exclusion)", "ct": "Road Allowance Community", "ev": "1912 | Petition campaign", "fm": "", "rc": "No land title: Road allowance communities had no legal recognition and were subject to forced displacement", "ac": "Generally accessible - verify with local community before visiting", "pr": "High", "ml": "Road Allowance Communities", "ic": "#E67E22", "y": 1912}, {"n": "Birds Hill", "la": 50.0069, "lo": -96.9203, "ds": "Named after James Curtis Bird, an HBC Chief Factor who received a 3,000-acre land grant here in 1824. Known as \"the Pines,\" its high ground served as a vital sanctuary for Red River settlers and their livestock during the great floods of 1826 and 1852.", "st": "A survival story set during the 1852 flood, where diverse groups of Métis and settlers huddle together on the high ground while the valley below becomes an inland sea. Birds Hill held special significance for Metis families as a historic sanctuary. Recognized around 1824 (Grant), this site served not just practically but spiritually and culturally -- where community identity was reinforced, the living connected with ancestors, and values defining Metis society were celebrated. Named after James ", "fo": "1824 (Grant)", "ct": "Historic Sanctuary", "ev": "1824 | 1826 | 1852", "fm": "Bird; Grant", "rc": "Traditional territory: Longstanding Metis presence predating colonial survey and settlement", "ac": "Generally accessible - verify with local community before visiting", "pr": "High", "ml": "Communities & Settlements", "ic": "#3498DB", "y": 1824}, {"n": "Birsay Village", "la": 51.0959, "lo": -106.9812, "ds": "Built west of Fort Douglas by Orkney-Cree Michif freemen seeking a sedentary life. Named for the home parish of leader Magnus Spence. The village was hit by outbreaks of whooping cough and measles, followed by a plague of grasshoppers that destroyed their crops.", "st": "A historical tragedy detailing the resilience and heartbreak of the Orkney freemen as they attempt to build a permanent home only to be defeated by disease and insects in 1819. Birsay Village was established by Metis families seeking the independence and community life that defined their settlement tradition. Starting around Oral tradition / approximate, families migrated to the Other / Dispersed Communities, drawn by fertile land, abundant game, navigable waterways, and the freedom to build on ", "fo": "Oral tradition / approximate", "ct": "Settlement", "ev": "1819", "fm": "Spence", "rc": "PFRA displacement: Community destroyed under Prairie Farm Rehabilitation Act for community pasture creation", "ac": "Site destroyed or inaccessible", "pr": "High", "ml": "Forts & Trading Posts", "ic": "#8E44AD", "y": 2000}, {"n": "Birsay Village or Orkney Town", "la": 51.0959, "lo": -106.9812, "ds": "Built west of Fort Douglas by Orkney-Cree Michif freemen seeking a sedentary life. Named for the home parish of leader Magnus Spence. The village was hit by outbreaks of whooping cough and measles, followed by a plague of grasshoppers that destroyed their crops.", "st": "A historical tragedy detailing the resilience and heartbreak of the Orkney freemen as they attempt to build a permanent home only to be defeated by disease and insects in 1819. Birsay Village or Orkney Town was established by Metis families seeking the independence and community life that defined their settlement tradition. Starting around 1817, families migrated to the Other / Dispersed Communities, drawn by fertile land, abundant game, navigable waterways, and the freedom to build on their own", "fo": "1817", "ct": "Settlement", "ev": "1819", "fm": "Spence", "rc": "PFRA displacement: Community destroyed under Prairie Farm Rehabilitation Act for community pasture creation", "ac": "Site destroyed or inaccessible", "pr": "High", "ml": "Forts & Trading Posts", "ic": "#8E44AD", "y": 1817}, {"n": "Black Butte (Butte Noir)", "la": 48.9833, "lo": -102.6667, "ds": "Known as 'Butte Noir' to the French-speaking Metis, this prominent landmark near the North Dakota-Manitoba border served as a critical navigation point for the great annual buffalo hunts between the Red River and the Missouri. Standing distinct against the horizon, it was used as a meeting place where hunt // COLOR HELPER
function tColor(c){
    var t=(c||'').toLowerCase();
    if(t.indexOf('fort')>-1||t.indexOf('trading')>-1) return '#8E44AD';
    if(t.indexOf('parish')>-1||t.indexOf('mission')>-1) return '#1ABC9C';
    if(t.indexOf('battle')>-1||t.indexOf('fight')>-1) return '#27AE60';
    if(t.indexOf('road')>-1) return '#E67E22';
    return '#E74C3C';
}

    if(!l.la || !l.lo) return;
    var col = (l.ic && l.ic !== '#3B82F6') ? l.ic : tColor(l.ct);

    if(!ML[layer]) { ML[layer]=[]; allL.push(layer); }

    if(l.pr) h+='<span class="priority priority-'+l.pr.replace(/\s/g,'')+'">'+esc(l.pr)+'</span>';
    
    if(l.ds) h+='<div class="section"><div class="section-label">Description</div><div class="section-text" style="font-weight:bold;color:#1a1a1a">'+esc(l.ds)+'</div></div>';
    if(l.st) h+='<div class="section"><div class="section-label">Heritage Story</div><div class="section-text">'+esc(l.st)+'</div></div>';
    if(l.ev) h+='<div class="section"><div class="section-label">Key Events</div><div class="section-text">'+esc(l.ev)+'</div></div>';
    if(l.fm) h+='<div class="section"><div class="section-label">Key Families</div><div class="section-text">'+esc(l.fm)+'</div></div>';
    if(l.rc) h+='<div class="section"><div class="section-label">Metis Rights</div><div class="section-text">'+esc(l.rc)+'</div></div>';
    if(l.ac) h+='<div class="section"><div class="section-label">Visitor Access</div><div class="section-text">'+esc(l.ac)+'</div></div>';
    h+='</div>';
    return h;
}

// SIDEBAR
function buildSB(){
    var ld = document.getElementById('layer-toggles');
    var td = document.getElementById('trail-toggles');
    
    // Stats
    var nSet = ML['Communities & Settlements'] ? ML['Communities & Settlements'].length : 0;
    var nForts = ML['Forts & Trading Posts'] ? ML['Forts & Trading Posts'].length : 0;
    document.getElementById('statbar').innerHTML = '<strong>'+nSet+' Settlements, '+nForts+' Forts</strong>';

    allL.sort().forEach(function(layer){
        var label = document.createElement('label');
        var cb = document.createElement('input'); cb.type='checkbox'; cb.checked=true; cb.onchange=updateLayers;
        cb.id = 'lyr-'+layer.replace(/[^a-zA-Z0-9]/g,'');
        label.appendChild(cb);
        label.append(layer+' ('+ML[layer].length+')');
        ld.appendChild(label);
    });
    allT.sort().forEach(function(layer){
        var label = document.createElement('label');
        var cb = document.createElement('input'); cb.type='checkbox'; 
        cb.checked = (layer !== 'Kinship Web'); // Hide kinship by default
        cb.onchange = updateLayers;
        cb.id = 'trl-'+layer.replace(/[^a-zA-Z0-9]/g,'');
        label.appendChild(cb);
        label.append(layer+' ('+TL[layer].length+')');
        td.appendChild(label);
    });
}

// TIME MACHINE
document.getElementById('year-slider').addEventListener('input', function() {
    var val = parseInt(this.value);
    var display = document.getElementById('year-display');
    display.textContent = (val >= 2000) ? "All Years" : val;
    display.style.color = (val >= 2000) ? "#333" : "#C0392B";
    
    Object.values(ML).forEach(function(arr){
        arr.forEach(function(m){
            var data = locs[m._index];
            if(data.y <= val) map.addLayer(m);
            else map.removeLayer(m);
        });
    });
});

// SEARCH
function doSearch(){
    var q = document.getElementById('search').value.toLowerCase().trim();
    if(!q) { updateLayers(); return; }
    Object.values(ML).forEach(function(arr){
        arr.forEach(function(m){
            var n = (m._name||'').toLowerCase();
            var d = (locs[m._index].ds||'').toLowerCase();
            if(n.indexOf(q)>-1 || d.indexOf(q)>-1) map.addLayer(m);
            else map.removeLayer(m);
        });
    });
}

// LAYER UPDATE
function updateLayers(){
    // Markers
    Object.values(ML).forEach(function(arr){
        arr.forEach(function(m){
            var layer = m._layer;
            var cbId = 'lyr-'+layer.replace(/[^a-zA-Z0-9]/g,'');
            var cb = document.getElementById(cbId);
            // Only add if checkbox checked AND time slider allows
            var timeOk = locs[m._index].y <= parseInt(document.getElementById('year-slider').value);
            if(cb && cb.checked && timeOk) map.addLayer(m);
            else map.removeLayer(m);
        });
    });
    // Trails/Kinship
    Object.values(TL).forEach(function(arr){
        arr.forEach(function(t){
            var layer = t._layer;
            var cbId = 'trl-'+layer.replace(/[^a-zA-Z0-9]/g,'');
            var cb = document.getElementById(cbId);
            if(cb && cb.checked) map.addLayer(t);
            else map.removeLayer(t);
        });
    });
}

function esc(s){ if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function openImg(u){ document.getElementById('ovimg').src=u; document.getElementById('ov').classList.add('open'); }

// INIT
buildSB();
Object.values(ML).forEach(function(a){ a.forEach(function(m){ map.addLayer(m) }) });
Object.values(TL).forEach(function(a){ a.forEach(function(t){ map.addLayer(t) }) });

</script>
