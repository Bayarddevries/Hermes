<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red River Metis Homeland - Interactive Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#1a1714;color:#f0e6d8}
:root{
  --bg:#1a1714;--bg2:#232019;--bg3:#2e2a22;
  --bgov:rgba(26,23,20,0.92);
  --accent:#c8956c;--accent2:#e6a97c;--accent3:#d4865a;--accent-glow:rgba(200,149,108,0.3);
  --glow:rgba(200,149,108,0.15);
  --t1:#f0e6d8;--t2:#a89b8c;--t3:#7a6f63;
  --brd:rgba(200,149,108,0.12);--brd2:rgba(200,149,108,0.25);
  --r1:6px;--r2:10px;--r3:14px;
  --xs:4px;--sm:8px;--md:16px;--lg:24px;
  --font:'Segoe UI',system-ui,sans-serif;
  --sh2:0 4px 12px rgba(0,0,0,0.3);--sh3:0 8px 32px rgba(0,0,0,0.5);
}
#map{width:100%;height:100vh;position:fixed;top:0;left:0;z-index:0}
.leaflet-container{touch-action:none}

/* Header */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bgov);backdrop-filter:blur(12px);padding:var(--sm) var(--lg);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);height:56px}
.h-brand{display:flex;flex-direction:column;gap:1px}
.h-title{font-size:1rem;font-weight:600;color:var(--t1);letter-spacing:.01em}
.h-sub{font-size:.72rem;color:var(--t3)}
.h-actions{display:flex;align-items:center;gap:var(--sm)}
.h-search{padding:var(--xs) var(--sm);border:1px solid var(--brd2);border-radius:var(--r2);background:var(--bg3);color:var(--t1);font-size:.8rem;width:200px;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.h-search::placeholder{color:var(--t3)}
.h-search:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.h-stat{display:flex;align-items:center;gap:var(--xs);padding:var(--xs) var(--sm);background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r2);font-size:.72rem;color:var(--t2)}
.h-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:68px;left:var(--md);z-index:1000;width:260px;max-height:calc(100vh - 84px);background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r3);box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column;transition:all .25s cubic-bezier(.4,0,.2,1)}
.sidebar.closed{transform:translateX(calc(-100% - var(--md)));opacity:0;pointer-events:none}
.sb-head{padding:var(--md);background:var(--bg3);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.sb-body{overflow-y:auto;padding:var(--xs) 0}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:var(--r1)}

/* Sidebar toggle button */
.sb-tog{position:fixed;top:72px;left:var(--md);z-index:999;width:40px;height:40px;border-radius:var(--r2);background:var(--bg2);border:1px solid var(--brd);box-shadow:var(--sh2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--t1);transition:all .25s cubic-bezier(.4,0,.2,1)}
.sb-tog:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.sb-tog.open{left:calc(260px + var(--md));opacity:0;pointer-events:none;transform:scale(.95)}

/* Close button in sidebar header */
.sb-x{background:none;border:none;color:var(--t3);font-size:1.3rem;cursor:pointer;padding:4px 8px;line-height:1;transition:color .15s;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.sb-x:hover{color:var(--accent);background:rgba(255,255,255,0.1);border-radius:4px}

/* Layer buttons */
.lbtn{display:flex;align-items:center;gap:var(--sm);padding:var(--sm) var(--md);cursor:pointer;font-size:.8rem;color:var(--t1);transition:background .15s;user-select:none;border-bottom:1px solid var(--brd)}
.lbtn:last-child{border-bottom:none}
.lbtn:hover{background:var(--glow)}
.lbtn.on{background:var(--glow)}
.ldot{width:10px;height:10px;border-radius:50%;border:2px solid var(--brd2);flex-shrink:0}
.ldot.on{border-color:transparent}
.lcnt{margin-left:auto;background:var(--bg3);padding:1px 8px;border-radius:10px;font-size:.68rem;color:var(--t3);font-variant-numeric:tabular-nums}
.ldiv{height:2px;background:var(--brd2);margin:var(--xs) var(--md)}
.linfo{background:none;border:none;color:var(--t3);cursor:pointer;padding:0 4px;font-size:.85rem;line-height:1;transition:color .15s;flex-shrink:0}
.linfo:hover{color:var(--accent)}

/* Category info modal */
.cat-modal{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:var(--lg)}
.cat-modal.show{display:flex}
.cat-modal-content{background:#232019;border:1px solid var(--brd2);border-radius:14px;max-width:500px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 48px rgba(0,0,0,.6)}
.cat-modal-header{padding:var(--md);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.cat-modal-title{font-size:1rem;font-weight:700;color:var(--t1)}
.cat-modal-close{background:none;border:none;color:var(--t3);font-size:1.5rem;cursor:pointer;padding:0 4px;line-height:1}
.cat-modal-close:hover{color:var(--accent)}
.cat-modal-body{padding:var(--md);overflow-y:auto;color:var(--t2);font-size:.85rem;line-height:1.6}
.cat-modal-body::-webkit-scrollbar{width:4px}
.cat-modal-body::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}

/* Legend */
.legend{position:fixed;bottom:var(--lg);right:var(--lg);z-index:1000;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);padding:var(--md);box-shadow:0 4px 16px rgba(0,0,0,.4);font-size:.75rem}
.leg-title{font-weight:600;color:var(--t1);margin-bottom:var(--sm);font-size:.78rem}
.leg-row{display:flex;align-items:center;gap:var(--sm);margin-bottom:var(--xs);color:var(--t2)}
.leg-line{width:28px;height:4px;border-radius:2px}

/* Leaflet overrides */
.leaflet-control-zoom{border:1px solid var(--brd2)!important;border-radius:var(--r2)!important;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--t2)!important;border-color:var(--brd)!important;width:32px!important;height:32px!important;line-height:32px!important;font-size:18px!important}
.leaflet-control-zoom a:hover{background:var(--accent3)!important;color:var(--t1)!important}
.leaflet-control-attribution{background:var(--bgov)!important;color:var(--t3)!important;font-size:.65rem!important}
.leaflet-control-attribution a{color:var(--accent)!important}

/* ===== TIMELINE ===== */
.timeline{
  position:fixed;bottom:0;left:0;right:0;z-index:1000;
  background:var(--bgov);backdrop-filter:blur(12px);
  padding:var(--xs) var(--lg) var(--sm);
  border-top:1px solid var(--brd);
}
.tl-head{display:flex;align-items:center;justify-content:space-between}
.tl-title{font-size:.7rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.tl-year{font-size:.95rem;color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
.tl-count{font-size:.7rem;color:var(--t2)}
.tl-slider{
  width:100%;height:4px;margin:var(--xs) 0;
  -webkit-appearance:none;appearance:none;
  background:linear-gradient(to right,var(--brd) 0%,var(--bg3) 100%);
  border-radius:2px;outline:none;cursor:pointer;
}
.tl-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 3px var(--bg),0 0 0 4px var(--accent-glow),0 2px 6px rgba(0,0,0,.4);
  cursor:pointer;
}
.tl-slider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;background:var(--accent);
  border:3px solid var(--bg);box-shadow:0 0 0 4px var(--accent-glow);
  cursor:pointer;
}
.tl-labels{display:flex;justify-content:space-between;padding:0 2px}
.tl-labels span{font-size:.6rem;color:var(--t3)}
.tl-reset{background:var(--bg3);border:1px solid var(--brd2);border-radius:var(--r1);padding:var(--xs) var(--sm);font-size:.65rem;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s}
.tl-reset:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ===== POPUPS - minimal overrides, let Leaflet handle positioning ===== */
.leaflet-popup-content-wrapper{
  background:#232019!important;
  color:#f0e6d8;
  border-radius:8px!important;
  box-shadow:0 4px 20px rgba(0,0,0,0.6)!important;
  padding:0!important;
}
.leaflet-popup-content{margin:0!important;min-width:200px}
.leaflet-popup-tip{background:#232019!important}
}
.priority-badge{
  padding:2px 8px;border-radius:4px;
  font-size:.6rem;font-weight:700;letter-spacing:.05em;
}
.priority-badge.high{background:rgba(244,67,54,.15);color:#f44336}
.priority-badge.medium{background:rgba(170,170,170,.12);color:#888}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  /* Header: stack vertical */
  .header{height:auto;padding:var(--xs) var(--sm);flex-wrap:wrap;gap:var(--xs)}
  .h-brand{flex:1;min-width:0}
  .h-title{font-size:.85rem}
  .h-sub{font-size:.65rem}
  .h-actions{width:100%;justify-content:space-between}
  .h-search{flex:1;min-width:0;width:auto}
  
  /* Sidebar: full-width sheet from left */
  .sidebar{top:60px;left:0;width:calc(100vw - 16px);max-height:65vh;border-radius:0 0 var(--r3) var(--r3)}
  .sidebar.closed{transform:translateX(-100%);opacity:0;pointer-events:none!important}
  .sidebar:not(.closed){transform:translateX(0);opacity:1}
  
  /* Toggle button position */
  .sb-tog{top:64px;left:var(--sm)}
  .sb-tog.open{left:var(--sm);opacity:0;pointer-events:none;transform:translateX(calc(100vw - 48px))}
  
  /* Timeline: compact on mobile */
  .timeline{padding:var(--xs) var(--sm) var(--xs)}
  .tl-head{flex-wrap:wrap;gap:0 var(--sm)}
  .tl-title{font-size:.6rem}
  .tl-year{font-size:.85rem}
  .tl-count{font-size:.6rem}
  .tl-slider{height:6px;-webkit-tap-highlight-color:transparent}
  .tl-slider::-webkit-slider-thumb{width:24px;height:24px}
  .tl-slider::-moz-range-thumb{width:24px;height:24px}
  .tl-labels{display:none}
  
  /* Legend: hide on mobile, reposition */
  .legend{bottom:80px;right:var(--sm);left:var(--sm);max-width:none;padding:var(--sm)}
  
  /* Zoom controls: small */
  .leaflet-control-zoom a{width:36px!important;height:36px!important;font-size:20px!important}
  .leaflet-control-zoom{bottom:var(--sm)!important;top:auto!important;right:var(--sm)!important;left:auto!important}
  
  /* Popup: narrow on mobile */
  .leaflet-popup-content-wrapper{max-width:calc(100vw - 32px)!important}
  .leaflet-popup-content{width:calc(100vw - 44px)!important;max-width:300px}
  .pop-title h3{font-size:.85rem}
  .pop-desc{max-height:120px;font-size:.78rem}
  .detail-label{min-width:50px}
}

@media(max-width:480px){
  .header{padding:var(--xs) var(--sm)}
  .h-title{font-size:.78rem}
  .h-sub{display:none}
  .stat{padding:var(--xs) var(--sm);font-size:.65rem}
  .sidebar{max-height:70vh}
  .tl-year{font-size:.78rem}
}

@media(min-width:1200px){
  .sidebar{width:280px}
}

/* ===== POLISH ===== */
/* Smooth entry animation */
.legend{animation:fadeUp .4s .3s both}
.timeline{animation:fadeUp .3s .4s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Sidebar: starts open, transition handles all show/hide */

/* Polished scrollbar for timeline labels */
.tl-labels{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;gap:var(--xs)}
.tl-labels::-webkit-scrollbar{display:none}

/* Active timeline label */
.tl-labels{position:relative}
.tl-labels .tl-active{color:var(--accent)!important;font-weight:700}

/* Smooth popup open - opacity only, no transform (Leaflet uses transform for positioning) */
.leaflet-popup{animation:fadeIn .2s both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}


.jct-mark{background:#FFD700;color:#222;width:10px;height:10px;border-radius:50%;border:2px solid #B8860B;box-shadow:0 0 6px rgba(255,215,0,.5)}.jct-mark.leaflet-interactive{cursor:pointer}.jct-tip{font-size:13px;color:#333;max-width:280px}.jct-tip h4{margin:0 0 4px;color:#B8860B;font-size:13px}.jct-tip p{margin:0 0 6px;color:#555;font-size:11px;line-height:1.4}.jct-tip .jct-sources{margin-top:4px;font-size:10px;color:#888}.jct-tip .jct-lbl{display:inline-block;background:#FFD700;color:#222;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-top:3px}


/* ===== Sources Modal ===== */
.src-modal{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.src-modal.show{display:flex}
.src-modal-content{background:#232019;border:1px solid var(--brd);border-radius:var(--r3);max-width:500px;width:90%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.src-modal-header{padding:var(--md);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.src-modal-header h3{margin:0;font-size:1rem;color:var(--t1)}
.src-modal-header button{background:none;border:none;color:var(--t3);font-size:1.4rem;cursor:pointer;padding:0 4px}
.src-modal-body{overflow-y:auto;padding:var(--md)}
.src-item{padding:var(--sm) 0;border-bottom:1px solid var(--brd);font-size:.85rem;color:var(--t2)}
.src-item:last-child{border-bottom:none}
.src-item .src-doc{font-weight:600;color:var(--t1);font-size:.9rem;margin-bottom:4px}
.src-item .src-detail{margin:2px 0;line-height:1.4}
.src-item .src-match{margin-top:6px;font-size:.75rem;color:var(--t3)}
.src-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.65rem;font-weight:600;margin-left:6px;vertical-align:middle}
.src-badge.high{background:#2d7a3a;color:#fff}
.src-badge.medium{background:#b8860b;color:#fff}
.src-badge.low{background:#c0392b;color:#fff}

</style>
</head>

<header class="header">
  <div class="h-brand">
    <span class="h-title">Red River Metis Homeland</span>
    <span class="h-sub" id="sub">Loading...</span>

  <div class="h-actions">
    <input class="h-search" id="search" placeholder="Search locations..." />

  </div>
</header>

<aside class="sidebar">
  <div class="sb-head">Map Layers <button class="sb-x" id="sb-x" title="Close sidebar" onclick="document.querySelector('.sidebar').classList.add('closed');var t=document.getElementById('sb-tog');if(t)t.classList.remove('open')" ontouchend="document.querySelector('.sidebar').classList.add('closed');var t=document.getElementById('sb-tog');if(t)t.classList.remove('open')">&times;</button></div>
  <div class="sb-body" id="layers"></div>
</aside>

<div class="cat-modal" id="cat-modal">
  <div class="cat-modal-content">
    <div class="cat-modal-header">
      <div class="cat-modal-title" id="cat-modal-title"></div>
      <button class="cat-modal-close" id="cat-modal-close">&times;</button>
    </div>
    <div class="cat-modal-body" id="cat-modal-body"></div>
  </div>
</div>



<button class="sb-tog" id="sb-tog" title="Open filters">&#9776;</button>

<div class="legend">
  <div class="leg-title">Transport Routes</div>
  <div class="leg-row"><div class="leg-line" style="background:var(--accent)"></div>Red River Cart Trails</div>
  <div class="leg-row"><div class="leg-line" style="background:#4da8da"></div>York Boat Routes</div>
  <div class="leg-row"><div class="leg-line" style="background:#FFD700;border-radius:50%;width:8px;height:8px"></div>Route Junction Points</div>
</div>

<!-- Timeline filter -->
<div class="timeline">
  <div class="tl-head">
    <span class="tl-title">Timeline Filter</span>
    <span class="tl-year" id="tl-year">All Eras</span>
    <span class="tl-count" id="tl-count"></span>
    <button class="tl-reset" id="tl-reset" title="Reset timeline">Reset</button>
  </div>
  <input type="range" class="tl-slider" id="tl-slider" min="0" max="12" value="12" step="1"/>'

  <div class="tl-labels">
    <span>1680</span><span>1720</span><span>1760</span><span>1800</span><span>1820</span><span>1840</span><span>1860</span><span>1870</span><span>1880</span><span>1890</span><span>1900</span><span>1950</span><span>All</span>
  </div>
</div>

<div id="map"></div>

  <button onclick="this.parentElement.style.display='none'" style="position:absolute;top:2px;right:4px;background:none;border:none;color:#f00;cursor:pointer;font-size:14px;">×</button>
</div>

  "category": "York Boat Routes",
  "name": "Saskatchewan River Route",
  "desc": "Major water artery flowing westward from the Saskatchewan River delta at Cedar Lake, past The Pas, into Saskatchewan toward Batoche, Fort Carlton, Fort Battleford, and Fort Edmonton. Roughly 1,100+ km from Norway House to Fort Edmonton following the river system. York Boats navigated this route from Norway House across Lake Winnipeg and up the Saskatchewan, ascending at the Grand Rapids of the Saskatchewan (a major portage around fierce rapids where the river enters Lake Winnipeg). The route served the same HBC posts as the overland Carlton Trail -- where carters went by land, boatmen went by water, and the two methods converged at the junction points. Métis voyageurs from St. Laurent, Batoche, and Duck Lake communities regularly crewed Saskatchewan River brigades, combining their knowledge of river navigation with the pemmican-fuelled travel that sustained the fur trade. The route was in decline by the mid-1880s as the Canadian Pacific Railway made water transport obsolete. [Morton, W.L. \"Manitoba: A History\", 1957; Canadian Encyclopedia, \"Saskatchewan River\"]",

{
  "category": "York Boat Routes",
  "name": "Assiniboine River Route",
  "desc": "River route along the Assiniboine River connecting Fort Garry at the forks (Winnipeg) to Fort Ellice at the confluence with the QuAppelle (near St. Lazare, MB), and onward to Brandon House and beyond. Approximately 380 km from Fort Garry to Fort Ellice. The Assiniboine was navigable by small York Boats and lighters during the spring high-water season, though summer low water often required boats to be poled, tracked, or even dragged over gravel bars. Metis communities at White Horse Plains (St. Francois Xavier), Prairie Portage, and Fort Ellice used this water route to transport pemmican, hides, and furs to the Red River settlement. The river valley also served as a natural corridor for the overland cart trails, creating a dual-mode transport corridor. Winter travel by dog sled followed the frozen river in the coldest months. [Ens, G. Homeland to Hinterland, 1996; Manitoba Historical Society, Assiniboine River Fur Trade]",

{
  "category": "York Boat Routes",
  "name": "Red River North Route (Lake Winnipeg)",
  "desc": "The northern water route ascending the Red River from the Red River Settlement (Fort Garry/St. Boniface) through Netley Creek and the marshlands, then across the broad expanse of Lake Winnipeg to Norway House at its north end, and onward via the Saskatchewan River to Cumberland House. The Red River itself was navigable by flat-bottomed boats and York Boats during spring flood, but became too shallow in summer for loaded craft. Métis boatmen from St. Andrews, St. Peter's, and the Red River parishes made regular trips upriver, carrying goods and pemmican. The lake crossing from the Red River mouth to Norway House (approximately 250 km across Lake Winnipeg) was demanding -- open-water voyages in lightly decked boats subject to sudden prairie storms. This route was the northern complement to the southbound cart trails and the key link between the Red River Settlement and the HBC's western department headquarters at Norway House. [Barkwell, L.J. \"The Red River Cart: A Historical Overview\", 2008; Canadian Encyclopedia, \"Red River\"]",

{
  "category": "York Boat Routes",
  "name": "Cedar Lake / Cumberland House Route",
  "desc": "Water route to Cumberland House, the HBC's first inland post established by Samuel Hearne in 1774 on the Saskatchewan River delta where it enters Cedar Lake. Approximately 530 km up the Saskatchewan River system from Norway House. Cumberland House was strategically positioned at a key junction: York Boats from the east (via the Hayes River and Lake Winnipeg) met canoe brigades from the western posts, and goods were transferred between the two systems. The lake itself (Cedar Lake, or \"Pine Island Lake\") was shallow and reed-choked in places, requiring experienced pilots who knew the channels. Métis and Cree families established a permanent settlement near the post, serving as boatmen, hunters, and provisioners for the fur trade. Cumberland House remained a critical depot until the CPR bypassed it in the 1880s. [Hearne, S. \"A Journey from Prince of Wales's Fort\", 1795; Canadian Encyclopedia, \"Cumberland House\"]",

// Category descriptions for educational context
const CAT_DESC = {
    'Forts & Trading Posts': '<p>Forts and trading posts were established by European fur trading companies — primarily the Hudson\'s Bay Company (HBC) and the North West Company (NWC) — across the Métis homeland from the late 1600s through the 1800s.</p><p>These posts were economic hubs that the Métis played a vital role in operating — as interpreters, guides, hunters, freighters, and provision suppliers. The Métis supplied <em>pemmican</em> (dried bison meat and fat) and other provisions to the posts, feeding the fur trade economy.</p><p>Over time, many of these posts became settlements where Métis families lived and built communities.',
    'Communities & Settlements': '<p>Métis communities and settlements formed organically across the homeland — along rivers, at river lots, and at natural gathering points. These were distinct from European-issued land grants and reflected the Métis\' own system of land occupation.</p><p>Settlements grew around family networks, churches, and the fur trade. Many began as small clusters of Métis farms connected by the <em>river lot</em> system — long, narrow plots of land with frontage along a river, giving each family access to water, fertile land, and transport routes.</p><p>Examples include St. Vital, St. Norbert, Grantown, and Batoche.',
    'Parishes & Missions': '<p>Parishes and missions were religious institutions — primarily Roman Catholic and Anglican — established across the Métis homeland.</p><p>For the Métis, the Catholic Church in particular was a central community institution. Parish records (baptisms, marriages, burials) are often the best historical record of Métis families and communities. Mission churches served as gathering points, schools, and centres of community life.</p><p>However, the church also played a complicated role in colonial assimilation policies.',
    'Road Allowance Communities': '<p><strong>"Road allowance"</strong> refers to strips of land — one mile wide — that were set aside for future roads when the Canadian government surveyed the prairies in the late 1800s.</p><p>After the Red River Resistance (1869–70) and the North-West Resistance (1885), many Métis lost their land scrip to speculators or were excluded from the land grant system. Dispossessed Métis families squatted on these unclaimed road allowance strips — the only land available to them — and built communities there.</p><p>These communities became known for their resilience but were also subject to extreme poverty and government neglect. Many were eventually displaced or dispersed.',
    'Wintering Grounds & Camps': '<p>Wintering grounds and camps were temporary or semi-permanent settlements where Métis families and hunting brigades would camp during the winter months.</p><p>The Métis were semi-nomadic, following the seasonal bison hunt. In summer they would travel across the plains; in winter they would settle in sheltered valleys, river bottoms, or wooded areas where fuel and shelter were available.</p><p>These sites were critical to Métis survival and culture — places of social gathering, storytelling, and community bonding.',
    'Battles & Resistance': '<p>These sites mark locations of armed conflict and resistance where Métis citizens and allies fought to defend their land, rights, and way of life.</p><p>Key events include the <strong>Red River Resistance (1869–70)</strong>, led by Louis Riel, which established the provisional government and negotiated Manitoba\'s entry into Confederation; the <strong>North-West Resistance (1885)</strong>, including the battles at Fish Creek, Batoche, and Duck Lake; and the <strong>North-West Rebellion</strong> more broadly.</p><p>These events are central to Métis identity and the ongoing struggle for recognition of Métis rights.',
    'Destroyed Communities': '<p>These were once-vibrant Métis communities that no longer exist — destroyed through land dispossession, government policy, economic displacement, or environmental change.</p><p>Many Métis settlements were abandoned after residents lost their land to speculators, were forced to relocate, or left due to lack of economic opportunity. Some communities were physically destroyed by flooding, railway construction, or urban development.</p><p>Remembering these sites is important for understanding the scope of Métis displacement and the resilience of communities that survived.',
    'Resource & Harvesting Sites': '<p>These are locations where Métis citizens harvested natural resources — bison hunting grounds, fish camps, trapping areas, berry-picking sites, and areas for gathering medicinal plants.</p><p>The Métis economy was based on seasonal rounds — moving between different resource harvesting sites throughout the year. This deep knowledge of the land and its cycles was passed down through generations.</p><p>These sites represent the Métis relationship with the land as a living, productive landscape that sustained families and communities.',
    'Governance & Rights': '<p>These sites are associated with Métis governance structures, political organizations, and the struggle for recognition of Métis rights.</p><p>This includes locations of Métis governments (like the provisional government at Red River), political meetings, sites of petitions and negotiations, and places associated with the ongoing struggle for land rights, language rights, and self-determination.</p><p>The Métis have long organized to assert their rights as a distinct Indigenous people with a unique history, language (Michif), and culture.',
    'Transportation Routes': '<p>These are the historic transportation routes that connected Métis communities across the homeland — overland cart trails, rivers, and lake crossings.</p><p>The most famous is the <strong>Red River Cart trail</strong> network — a system of trails connecting settlements across the prairies. The distinctive Red River Cart, with its large wooden wheels, could carry heavy loads across the plains without roads.</p><p>Other important routes included the <strong>Carlton Trail</strong>, <strong>York boat water routes</strong> on rivers and lakes, and winter roads used for freight and travel.'
};

// ===== TIMELINE FILTER =====
// Era cutoffs match slider positions 0-12
// 0=1680 (most restrictive) → 11=1950 → 12=All
var eras = [1680, 1720, 1760, 1800, 1820, 1840, 1860, 1870, 1880, 1890, 1900, 1950, 99999];

function parseFirstYear(text) {
    if (!text) return 99999;
    var low = text.toLowerCase();
    // Ancient, Historic, Oral tradition, approximate = very old, always show
    if (low.indexOf('ancient') > -1 || low.indexOf('historic') > -1 || low.indexOf('oral') > -1 || low.indexOf('traditional') > -1 || low.indexOf('approximate') > -1) return 1;
    var m = text.match(/(\d{4})/);
    return m ? parseInt(m[1]) : 99999;
}

function applyTimeline() {
    var idx = parseInt(document.getElementById('tl-slider').value);
    var cutoff = eras[idx];
    
    // Position 12 = "All" — show everything, skip filtering
    if (idx === eras.length - 1) {
        resetTimeline();
        return;
    }
    
    document.getElementById('tl-year').textContent = 'Up to ' + cutoff;
    
    // Filter location markers — use direct _marker refs (not eachLayer which misses hidden markers)
    var visibleCount = 0;
    locations.forEach(function(loc) {
        var year = parseFirstYear(loc.founded);
        var m = loc._marker;
        if (!m) return;
        
        if (year <= cutoff) {
            if (!LG[loc.layer].hasLayer(m)) { LG[loc.layer].addLayer(m); visibleCount++; }
        } else {
            if (LG[loc.layer].hasLayer(m)) LG[loc.layer].removeLayer(m);
        }
    });
    
    // Filter trails — rebuild both groups from scratch
    cartTG.clearLayers();
    boatTG.clearLayers();
    trails.forEach(function(t) {
        var startYear = parseFirstYear(t.year);
        if (startYear <= cutoff) {
            var grp = t.category === 'Red River Cart Trails' ? cartTG : boatTG;
            addTrailToGroup(t, grp);
        }
    });
    
    cartBtn.querySelector('.lcnt').textContent = cartTG.getLayers().length;
    boatBtn.querySelector('.lcnt').textContent = boatTG.getLayers().length;
    
    document.getElementById('tl-count').textContent = visibleCount + ' locations';
    document.getElementById('vc').textContent = visibleCount;
}

function resetTimeline() {
    // Reset slider to All
    document.getElementById('tl-slider').value = eras.length - 1;
    document.getElementById('tl-year').textContent = 'All Eras';
    document.getElementById('tl-count').textContent = locations.length + ' locations';
    document.getElementById('vc').textContent = locations.length;
    
    // Show all location markers using direct refs
    locations.forEach(function(loc) {
        if (loc._marker && !LG[loc.layer].hasLayer(loc._marker)) {
            LG[loc.layer].addLayer(loc._marker);
        }
    });
    
    // Rebuild all trails
    cartTG.clearLayers();
    boatTG.clearLayers();
    trails.forEach(function(t) {
        addTrailToGroup(t, t.category === 'Red River Cart Trails' ? cartTG : boatTG);
    });
    
    cartBtn.querySelector('.lcnt').textContent = cartTG.getLayers().length;
    boatBtn.querySelector('.lcnt').textContent = boatTG.getLayers().length;
}
    document.getElementById("jct-cnt").textContent = jctTG.getLayers().length;

document.getElementById('tl-slider').addEventListener('input', function() {
    applyTimeline();
    // Update sidebar trail counts
    cartBtn.querySelector('.lcnt').textContent = cartTG.getLayers().length;
    boatBtn.querySelector('.lcnt').textContent = boatTG.getLayers().length;
});

// ===== SOURCES MODAL =====
function showSources(btn) {
    var popup = btn.closest('.leaflet-popup-content');
    if (!popup) return;
    // Location name is in first div.font-weight:700 inside the popup, NOT an h2
    var nameEl = popup.querySelector('[style*="font-weight:700"], h2, h3');
    if (!nameEl) return;
    var locName = nameEl.textContent.trim();

    // Try exact match first, then case-insensitive fallback
    var sources = LOCATION_SOURCES[locName];
    if (!sources || !sources.length) {
        var lowerName = locName.toLowerCase();
        for (var key in LOCATION_SOURCES) {
            if (key.toLowerCase() === lowerName) { sources = LOCATION_SOURCES[key]; break; }
        }
    }
    if (!sources || !sources.length) return;

    var esc = function(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
    var modal = document.getElementById('src-modal');
    if (modal) modal.remove();

    var html = '<div id="src-modal" class="src-modal show" onclick="if(event.target===this)closeSources()">';
    html += '<div class="src-modal-content">';
    html += '<div class="src-modal-header"><h3>Sources: ' + esc(locName) + '</h3>';
    html += '<button onclick="closeSources()">&times;</button></div>';
    html += '<div class="src-modal-body">';

    sources.forEach(function(src, i) {
        html += '<div class="src-item">';
        html += '<div class="src-doc">' + (i+1) + '. ' + (src.author || '') + '</div>';
        if (src.document) html += '<div class="src-detail">' + esc(src.document) + (src.page ? ', Page ' + src.page : '') + '</div>';
        if (src.entry) html += '<div class="src-detail">"' + esc(src.entry) + '"</div>';
        if (src.confidence) {
            var conf = src.confidence >= 0.7 ? 'Strong' : (src.confidence >= 0.5 ? 'Partial' : 'Weak');
            var cls = src.confidence >= 0.7 ? 'high' : (src.confidence >= 0.5 ? 'medium' : 'low');
            html += '<div class="src-match">Confidence: ' + src.confidence + ' <span class="src-badge ' + cls + '">' + conf + '</span></div>';
        }
        html += '</div>';
    });

    html += '</div></div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
}
function closeSources() {
    var modal = document.getElementById('src-modal');
    if (modal) modal.remove();
}
